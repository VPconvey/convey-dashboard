<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Convey Pet Relocation — Dashboard งาน</title>
<style>
:root{
  --bg:#eef2f6;--card:#ffffff;--ink:#0f172a;--mut:#64748b;--line:#e2e8f0;
  --brand:#0d9488;--brand-d:#0f766e;--brand-l:#ccfbf1;
  --done:#16a34a;--done-l:#dcfce7;--gray:#cbd5e1;--gray-l:#f1f5f9;
  --red:#dc2626;--red-l:#fee2e2;--amber:#d97706;--amber-l:#fef3c7;--blue:#2563eb;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{font-family:'Leelawadee UI','Sarabun','Noto Sans Thai',-apple-system,'Segoe UI',Tahoma,sans-serif;
  background:var(--bg);color:var(--ink);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;}
#app{display:flex;min-height:100vh;}

/* Sidebar */
aside{width:236px;background:#0f172a;color:#cbd5e1;flex-shrink:0;display:flex;flex-direction:column;
  position:sticky;top:0;height:100vh;}
.logo{padding:18px 18px 14px;border-bottom:1px solid #1e293b;}
.logo b{color:#fff;font-size:15px;display:block;}
.logo span{font-size:11px;color:#64748b;}
nav{padding:8px;overflow-y:auto;flex:1;}
.nav-sec{font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;color:#475569;padding:12px 12px 5px;}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 11px;border-radius:8px;cursor:pointer;
  font-size:13.5px;color:#cbd5e1;margin-bottom:1px;transition:.12s;}
.nav-item:hover{background:#1e293b;color:#fff;}
.nav-item.active{background:var(--brand);color:#fff;font-weight:600;}
.nav-item .ic{width:20px;text-align:center;font-size:14px;}
.nav-item .cnt{margin-left:auto;background:#1e293b;color:#94a3b8;font-size:11px;
  padding:1px 7px;border-radius:10px;}
.nav-item.active .cnt{background:rgba(255,255,255,.22);color:#fff;}

/* Main */
main{flex:1;min-width:0;display:flex;flex-direction:column;}
.topbar{background:var(--card);border-bottom:1px solid var(--line);padding:14px 26px;
  display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:30;}
.topbar h1{font-size:18px;font-weight:700;}
.topbar .sub{font-size:12px;color:var(--mut);}
.topbar .right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.content{padding:22px 26px 60px;}

/* Buttons */
.btn{border:1px solid var(--line);background:var(--card);color:var(--ink);padding:8px 14px;
  border-radius:8px;cursor:pointer;font-size:13px;font-family:inherit;font-weight:500;transition:.12s;
  text-decoration:none;display:inline-block;}
.attach-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-top:1px dashed var(--line);font-size:12.5px;}
.urgent-card{background:var(--card);border:1px solid var(--line);border-left:4px solid #d97706;border-radius:12px;padding:14px 16px;margin-bottom:18px;}
.urgent-head{font-size:14px;font-weight:700;margin-bottom:10px;color:#92400e;display:flex;align-items:center;gap:8px;}
.urgent-list{display:flex;flex-direction:column;gap:6px;}
.urgent-row{display:flex;align-items:center;gap:10px;padding:8px 11px;background:#f8fafc;border-radius:8px;cursor:pointer;font-size:12.5px;flex-wrap:wrap;transition:.12s;}
.urgent-row:hover{background:#eef2f6;}
.urgent-countdown{padding:3px 10px;border-radius:14px;font-size:11px;font-weight:700;white-space:nowrap;min-width:90px;text-align:center;}
.urgent-countdown.overdue{background:var(--red);color:#fff;}
.urgent-countdown.today{background:#d97706;color:#fff;}
.urgent-countdown.warn{background:#fed7aa;color:#9a3412;}
.urgent-countdown.soft{background:#fef3c7;color:#854d0e;}
.urgent-countdown.ok{background:var(--gray-l);color:var(--mut);}
.urgent-meta{flex:1;min-width:240px;}
.urgent-meta b{color:var(--brand-d);}
.urgent-assignee{font-size:11px;color:var(--brand-d);font-weight:600;}
.urgent-travel{font-size:11px;color:var(--mut);}
.btn:hover{background:var(--gray-l);}
.btn.primary{background:var(--brand);border-color:var(--brand);color:#fff;}
.btn.primary:hover{background:var(--brand-d);}
.btn.danger{background:var(--card);border-color:var(--red);color:var(--red);}
.btn.danger:hover{background:var(--red-l);}
.btn.sm{padding:5px 10px;font-size:12px;}
.btn.ghost{border-color:transparent;background:transparent;}
.btn.ghost:hover{background:var(--gray-l);}

/* Cards */
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:20px;}
.stat{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px 18px;}
.stat .lbl{font-size:12px;color:var(--mut);}
.stat .val{font-size:30px;font-weight:800;margin-top:3px;}
.stat .val small{font-size:13px;font-weight:600;color:var(--mut);}
.stat.b1{border-top:3px solid var(--brand);}
.stat.b2{border-top:3px solid var(--blue);}
.stat.b3{border-top:3px solid var(--done);}
.stat.b4{border-top:3px solid var(--amber);}

/* Filters */
.filters{display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end;background:var(--card);
  border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:16px;}
.fld{display:flex;flex-direction:column;gap:3px;}
.fld label{font-size:11px;color:var(--mut);font-weight:600;}
input,select,textarea{font-family:inherit;font-size:13px;border:1px solid var(--line);
  border-radius:7px;padding:7px 9px;background:#fff;color:var(--ink);}
input:focus,select:focus,textarea:focus{outline:2px solid var(--brand-l);border-color:var(--brand);}
input[type=date]{min-width:140px;}

/* Section / overview table */
.sec-title{font-size:14px;font-weight:700;margin:6px 0 10px;display:flex;align-items:center;gap:8px;}
.tbl-wrap{overflow:auto;border:1px solid var(--line);border-radius:12px;background:var(--card);}
table{border-collapse:separate;border-spacing:0;width:100%;}
th,td{padding:9px 11px;text-align:left;font-size:12.5px;border-bottom:1px solid var(--line);white-space:nowrap;}
th{background:#f8fafc;font-weight:700;color:#334155;position:sticky;top:0;z-index:2;font-size:11.5px;}
tbody tr:hover{background:#f8fafc;}
tbody tr:last-child td{border-bottom:none;}
.t-mut{color:var(--mut);}
.t-r{text-align:right;}
.neg-amt{color:var(--red);font-weight:700;}
.sec-title{margin-top:22px;}

/* Matrix table (job tabs) */
.mx th.grp{text-align:center;background:#eef2f6;border-left:2px solid var(--line);}
.mx th.grp.docs{background:#eff6ff;color:#1d4ed8;}
.mx th.grp.steps{background:#f0fdfa;color:var(--brand-d);}
.mx .sticky-l{position:sticky;left:0;background:var(--card);z-index:3;border-right:2px solid var(--line);min-width:150px;}
.mx th.sticky-l{z-index:5;background:#f8fafc;}
.mx tbody tr:hover .sticky-l{background:#f8fafc;}
.mx .sc{text-align:center;padding:5px 6px;min-width:114px;border-left:1px solid #eef2f6;}
.mx td.firstdoc,.mx th.firstdoc{border-left:2px solid #dbeafe;}
.mx td.firststep,.mx th.firststep{border-left:2px solid #ccfbf1;}

/* Toggle dot */
.dot{width:30px;height:30px;border-radius:50%;border:2px solid var(--gray);background:var(--gray-l);
  cursor:pointer;font-size:15px;color:#fff;display:inline-flex;align-items:center;justify-content:center;
  transition:.12s;font-weight:700;}
.dot:hover{transform:scale(1.08);}
.dot.done{background:var(--done);border-color:var(--done);box-shadow:0 1px 4px rgba(22,163,74,.4);}
.cd{margin-top:3px;width:108px;font-size:10.5px;padding:3px 4px;color:var(--mut);}
.cd.has{color:var(--ink);border-color:#bbf7d0;}

/* progress bar */
.pbar{width:100%;height:7px;background:var(--gray-l);border-radius:6px;overflow:hidden;}
.pbar i{display:block;height:100%;background:var(--brand);border-radius:6px;}
.pwrap{display:flex;align-items:center;gap:7px;}
.pwrap span{font-size:11px;color:var(--mut);font-weight:600;min-width:34px;}

/* badges */
.badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;
  padding:3px 9px;border-radius:20px;}
.bg-paid{background:var(--done-l);color:#15803d;}
.bg-unpaid{background:var(--amber-l);color:#b45309;}
.bg-closed{background:var(--brand-l);color:var(--brand-d);}
.bg-prog{background:#e0e7ff;color:#4338ca;}
.bg-type{background:#f1f5f9;color:#475569;}
.chip-ok{color:var(--done);font-weight:700;}
.chip-no{color:var(--red);font-weight:700;}
.chip-na{color:var(--mut);}

/* Form */
.form-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;}
.form-grid .f.wide{grid-column:1/-1;}
.form-card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:18px 20px;margin-bottom:18px;}
.form-card h3{font-size:14px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px;
  padding-bottom:10px;border-bottom:1px solid var(--line);}
.f{display:flex;flex-direction:column;gap:4px;}
.f label{font-size:12px;color:#334155;font-weight:600;}
.f label .req{color:var(--red);}
.f input,.f select,.f textarea{width:100%;}
.be{font-size:11px;color:var(--brand-d);font-weight:600;margin-top:2px;min-height:14px;}
.radio-row{display:flex;gap:10px;flex-wrap:wrap;}
.radio-row label{display:inline-flex;align-items:center;justify-content:center;gap:8px;
  border:1px solid var(--line);padding:10px 16px;border-radius:8px;cursor:pointer;
  font-weight:600;font-size:13px;white-space:nowrap;flex:1 1 160px;}
.radio-row label.on{border-color:var(--brand);background:var(--brand-l);color:var(--brand-d);}
.radio-row input{accent-color:var(--brand);flex:none;width:16px;height:16px;margin:0;}

/* vaccine */
.vax-group{border:1px solid var(--line);border-radius:10px;padding:13px 14px;margin-bottom:12px;background:#fcfdfd;}
.vax-group > .vh{display:flex;align-items:center;gap:8px;margin-bottom:9px;}
.vax-group > .vh b{font-size:13px;}
.vax-row{display:grid;grid-template-columns:74px 1fr 1fr 150px 30px;gap:9px;align-items:start;
  padding:8px 0;border-top:1px dashed var(--line);}
.vax-row:first-of-type{border-top:none;}
.vax-row .pin{font-size:12px;font-weight:700;color:var(--brand-d);padding-top:8px;}
.vax-row .vfld label{font-size:10.5px;color:var(--mut);font-weight:600;}
.vax-row .vfld input{width:100%;}
.vax-row .vst{padding-top:7px;font-size:18px;text-align:center;}
.vax-rm{border:none;background:none;color:var(--red);cursor:pointer;font-size:16px;padding-top:7px;}
.vax-result{border-radius:10px;padding:12px 14px;margin-top:6px;font-size:12.5px;}
.vax-result.ok{background:var(--done-l);border:1px solid #bbf7d0;}
.vax-result.no{background:var(--red-l);border:1px solid #fecaca;}
.vax-result.na{background:var(--gray-l);border:1px solid var(--line);}
.vax-result ul{margin:6px 0 0 4px;list-style:none;}
.vax-result li{padding:3px 0;display:flex;gap:7px;align-items:flex-start;}
.cost-row{display:grid;grid-template-columns:1fr 170px 30px;gap:9px;margin-bottom:7px;align-items:center;}
.cost-rm{border:none;background:none;color:var(--red);cursor:pointer;font-size:15px;}
.fin-sum{display:flex;flex-wrap:wrap;gap:10px;}
.fin-sum>div{flex:1 1 160px;background:var(--gray-l);border-radius:9px;padding:10px 14px;
  display:flex;flex-direction:column;gap:2px;}
.fin-sum>div span{font-size:11px;color:var(--mut);}
.fin-sum>div b{font-size:18px;}
.fin-profit{background:var(--done-l)!important;}
.fin-profit b{color:#15803d;}
.fin-profit.neg{background:var(--red-l)!important;}
.fin-profit.neg b{color:var(--red);}

.hint{background:#fffbeb;border:1px solid #fde68a;border-radius:8px;padding:9px 12px;
  font-size:12px;color:#92400e;margin-bottom:12px;}
.empty{text-align:center;padding:50px 20px;color:var(--mut);}
.empty .big{font-size:40px;margin-bottom:8px;}

/* toast */
#toast{position:fixed;bottom:22px;right:22px;z-index:200;display:flex;flex-direction:column;gap:8px;}
.toast{background:#0f172a;color:#fff;padding:11px 16px;border-radius:9px;font-size:13px;
  box-shadow:0 8px 24px rgba(0,0,0,.25);animation:slidein .2s;max-width:340px;}
.toast.ok{background:var(--brand-d);}
.toast.err{background:var(--red);}
@keyframes slidein{from{transform:translateX(40px);opacity:0;}}

/* settings */
.set-row{display:flex;gap:12px;flex-wrap:wrap;align-items:center;padding:11px 0;border-bottom:1px solid var(--line);}
.set-row:last-child{border-bottom:none;}
pre{background:#0f172a;color:#e2e8f0;padding:14px;border-radius:9px;font-size:11.5px;
  overflow:auto;line-height:1.55;}
code{background:var(--gray-l);padding:1px 6px;border-radius:4px;font-size:12px;}
.pill{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;}
.pill.on{background:var(--done-l);color:#15803d;}
.pill.off{background:var(--gray-l);color:var(--mut);}
a{color:var(--brand-d);}
.mini{font-size:11.5px;color:var(--mut);}
.row-actions{display:flex;gap:4px;}
</style>
</head>
<body>
<div id="app">
  <aside>
    <div class="logo">
      <b>🐾 Convey Pet Relocation</b>
      <span>Dashboard ภาพรวมการทำงาน</span>
    </div>
    <nav id="nav"></nav>
  </aside>
  <main>
    <div class="topbar">
      <div>
        <h1 id="pageTitle">ภาพรวม</h1>
        <div class="sub" id="pageSub"></div>
      </div>
      <div class="right">
        <span class="pill off" id="modePill">Local</span>
        <button class="btn sm" data-act="nav" data-view="new">+ บันทึกงานใหม่</button>
      </div>
    </div>
    <div class="content" id="content"></div>
  </main>
</div>
<div id="toast"></div>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script>
"use strict";
/* ============================ CONFIG ============================ */

const MIXED_BREED="พันธุ์ผสม (Mixed)";

const $=s=>document.querySelector(s);

const uid=()=>"j"+Date.now().toString(36)+Math.random().toString(36).slice(2,7);
function todayStr(){const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function parseD(s){if(!s||!/^\d{4}-\d{2}-\d{2}$/.test(s))return null;const p=s.split("-").map(Number);const d=new Date(Date.UTC(p[0],p[1]-1,p[2]));return isNaN(d)?null:d;}
function daysBetween(a,b){if(!a||!b)return null;return Math.round((a-b)/86400000);}
function toBE(s){const d=parseD(s);if(!d)return"";return d.getUTCDate()+" "+TH_MON[d.getUTCMonth()]+" "+(d.getUTCFullYear()+543);}
function fmtCE(s){const d=parseD(s);if(!d)return"-";return d.getUTCDate()+" "+TH_MON[d.getUTCMonth()]+" "+d.getUTCFullYear();}
function breedDisplay(p){if(!p)return"";if(p.breedMix)return (p.breed||"")+" — "+p.breedMix;return p.breed||"";}
function petsShort(job){const ps=job.pets||[];if(!ps.length)return "-";

function presetRange(p){
  const n=new Date();const pad=x=>String(x).padStart(2,"0");
  function mr(y,m){const d=new Date(y,m,1),last=new Date(y,m+1,0);
    return[d.getFullYear()+"-"+pad(d.getMonth()+1)+"-01",last.getFullYear()+"-"+pad(last.getMonth()+1)+"-"+pad(last.getDate())];}
  if(p==="thismonth")return mr(n.getFullYear(),n.getMonth());
  if(p==="lastmonth")return mr(n.getFullYear(),n.getMonth()-1);
  if(p==="thisyear")return[n.getFullYear()+"-01-01",n.getFullYear()+"-12-31"];
  return["",""];
}

/* ============================ STORAGE ============================ */
function saveLocal(){try{localStorage.setItem(LS_KEY,JSON.stringify(DB));}catch(e){toast("บันทึกลงเครื่องไม่สำเร็จ: "+e.message,"err");}}
function loadLocal(){
  try{const raw=localStorage.getItem(LS_KEY);if(raw){const d=JSON.parse(raw);
    DB.jobs=Array.isArray(d.jobs)?d.jobs:[];
    DB.cloud=Object.assign({url:"",key:"",enabled:false},d.cloud||{});
    DB.drive=Object.assign({clientId:"",folderId:"",enabled:false},d.drive||{});}}
  catch(e){console.warn("load error",e);}
  DB.jobs.forEach(migrateJobPets);
}
function migrateJobPets(job){
  if(!job||Array.isArray(job.pets))return;
  const p=job.pet||{};
  job.pets=[{name:p.name||"",microchip:p.microchip||"",color:p.color||"",sex:p.sex||"",
    dob:p.dob||"",species:p.species||"",breed:p.breed||"",breedMix:p.breedMix||"",
    vax:job.vax||{combined:[],lepto:[],rabies:[]},
    microchipDate:job.microchipDate||"",bloodDate:job.bloodDate||""}];
}
function getJob(id){return DB.jobs.find(j=>j.id===id);}
function nextJobNo(){
  const n=new Date();
  const key=n.getFullYear()+"-"+String(n.getMonth()+1).padStart(2,"0");
  const prefix="CV-"+key+"-";
  let max=0;
  DB.jobs.forEach(j=>{if(j.jobNo&&j.jobNo.indexOf(prefix)===0){const num=parseInt(j.jobNo.slice(prefix.length),10);if(num>max)max=num;}});
  return prefix+String(max+1).padStart(3,"0");
}
function backfillJobNos(){
  let changed=false;
  DB.jobs.forEach(j=>{if(!j.recordDate){j.recordDate=j.createdAt?j.createdAt.slice(0,10):todayStr();changed=true;}});
  const need=DB.jobs.filter(j=>!j.jobNo);
  if(need.length){
    need.sort((a,b)=>(a.createdAt||"").localeCompare(b.createdAt||""));
    need.forEach(j=>{
      const d=j.createdAt?new Date(j.createdAt):new Date();
      const key=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");
      const prefix="CV-"+key+"-";
      let max=0;
      DB.jobs.forEach(x=>{if(x.jobNo&&x.jobNo.indexOf(prefix)===0){const num=parseInt(x.jobNo.slice(prefix.length),10);if(num>max)max=num;}});
      j.jobNo=prefix+String(max+1).padStart(3,"0");
    });
    changed=true;
  }
  if(changed)saveLocal();
}
function persistJob(job){
  job.updatedAt=new Date().toISOString();
  const i=DB.jobs.findIndex(j=>j.id===job.id);
  if(i<0)DB.jobs.push(job);else DB.jobs[i]=job;
  saveLocal();
  if(DB.cloud.enabled)cloudUpsert(job);
}
function deleteJob(id){
  DB.jobs=DB.jobs.filter(j=>j.id!==id);saveLocal();
  if(DB.cloud.enabled)cloudDelete(id);
}

/* ------- Cloud (Supabase / Postgres SQL) ------- */
function cloudHeaders(){return{apikey:DB.cloud.key,Authorization:"Bearer "+DB.cloud.key,"Content-Type":"application/json"};}
function cloudBase(){
  let u=(DB.cloud.url||"").trim().replace(/\/+$/,"").replace(/\/rest\/v1.*$/i,"");
  return u+"/rest/v1/dashboard_jobs";
}
function cloudErr(e){
  let m=(e&&e.message)||String(e);
  if(typeof location!=="undefined"&&location.protocol==="file:")
    m+=" — สาเหตุน่าจะเป็นเพราะเปิดไฟล์แบบ file:// เบราว์เซอร์บล็อกการเชื่อมต่อ Cloud • วิธีแก้: เปิดผ่าน Google Chrome หรือ host ไฟล์ขึ้นเว็บก่อน";
  return m;
}
async function cloudUpsert(job){
  try{await fetch(cloudBase(),{method:"POST",headers:Object.assign(cloudHeaders(),{Prefer:"resolution=merge-duplicates,return=minimal"}),
    body:JSON.stringify([{id:job.id,data:job,updated_at:job.updatedAt}])});}
  catch(e){console.warn("cloud upsert fail",e);}
}
async function cloudDelete(id){
  try{await fetch(cloudBase()+"?id=eq."+encodeURIComponent(id),{method:"DELETE",headers:Object.assign(cloudHeaders(),{Prefer:"return=minimal"})});}
  catch(e){console.warn("cloud delete fail",e);}
}
async function cloudPull(silent){
  try{const r=await fetch(cloudBase()+"?select=id,data,updated_at",{headers:cloudHeaders()});
    if(!r.ok)throw new Error("HTTP "+r.status);
    const rows=await r.json();let added=0,updated=0;
    rows.forEach(row=>{const j=row.data;if(!j||!j.id)return;migrateJobPets(j);
      const ex=getJob(j.id);
      if(!ex){DB.jobs.push(j);added++;}
      else if((row.updated_at||"")>(ex.updatedAt||"")){const i=DB.jobs.findIndex(x=>x.id===j.id);DB.jobs[i]=j;updated++;}});
    saveLocal();
    if(!silent)toast("ดึงข้อมูลจาก Cloud สำเร็จ — เพิ่ม "+added+" / อัปเดต "+updated,"ok");
    return true;
  }catch(e){if(!silent)toast("ดึงข้อมูล Cloud ไม่สำเร็จ: "+cloudErr(e),"err");return false;}
}
async function cloudPush(){
  try{const body=DB.jobs.map(j=>({id:j.id,data:j,updated_at:j.updatedAt||new Date().toISOString()}));
    const r=await fetch(cloudBase(),{method:"POST",headers:Object.assign(cloudHeaders(),{Prefer:"resolution=merge-duplicates,return=minimal"}),
      body:JSON.stringify(body)});
    if(!r.ok)throw new Error("HTTP "+r.status);
    toast("ส่งข้อมูลขึ้น Cloud สำเร็จ ("+body.length+" งาน)","ok");return true;
  }catch(e){toast("ส่งข้อมูลขึ้น Cloud ไม่สำเร็จ: "+cloudErr(e),"err");return false;}
}

/* ============================ GOOGLE DRIVE ============================ */
function driveReady(){return !!(DB.drive&&DB.drive.enabled&&DB.drive.clientId);}
function ensureDriveToken(){
  return new Promise((resolve,reject)=>{
    if(driveToken&&Date.now()<driveTokenExp-60000){resolve(driveToken);return;}
    if(typeof google==="undefined"||!google.accounts||!google.accounts.oauth2){
      reject(new Error("โหลดไลบรารี Google ไม่สำเร็จ — ตรวจอินเทอร์เน็ตแล้วลองใหม่"));return;}
    try{
      const tc=google.accounts.oauth2.initTokenClient({
        client_id:DB.drive.clientId,
        scope:"https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/calendar.events",
        callback:(resp)=>{
          if(resp&&resp.access_token){driveToken=resp.access_token;
            driveTokenExp=Date.now()+((resp.expires_in||3600)*1000);resolve(driveToken);}
          else reject(new Error("ขอสิทธิ์ Google Drive ไม่สำเร็จ"));
        },
        error_callback:(e)=>reject(new Error("เชื่อมต่อ Google ไม่สำเร็จ"+(e&&e.type?(" ("+e.type+")"):"")))
      });
      tc.requestAccessToken();
    }catch(e){reject(e);}
  });
}
async function ensureDriveFolder(token){
  if(DB.drive.folderId)return DB.drive.folderId;
  const r=await fetch("https://www.googleapis.com/drive/v3/files?fields=id",{
    method:"POST",headers:{Authorization:"Bearer "+token,"Content-Type":"application/json"},
    body:JSON.stringify({name:"Convey Pet Relocation - เอกสารงาน",mimeType:"application/vnd.google-apps.folder"})});
  if(!r.ok)throw new Error("สร้างโฟลเดอร์ Drive ไม่สำเร็จ (HTTP "+r.status+")");
  const d=await r.json();
  DB.drive.folderId=d.id;saveLocal();
  return d.id;
}
async function driveUpload(file,filename){
  const token=await ensureDriveToken();
  const folderId=await ensureDriveFolder(token);
  const meta={name:filename,parents:[folderId]};
  const fd=new FormData();
  fd.append("metadata",new Blob([JSON.stringify(meta)],{type:"application/json"}));
  fd.append("file",file);
  const r=await fetch("https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,name,webViewLink",{
    method:"POST",headers:{Authorization:"Bearer "+token},body:fd});
  if(!r.ok)throw new Error("อัปโหลดไม่สำเร็จ (HTTP "+r.status+")");
  return await r.json();
}
function attachFilenameBase(){
  syncCountryFromDOM("origin");syncCountryFromDOM("dest");
  const cn=$("#f-cname")?$("#f-cname").value.trim():"";
  const jt=$("#f-jtype")?((JOB_TYPES[$("#f-jtype").value]||{}).label||""):"";
  const org=resolveCountry("origin").split(" (")[0].trim();
  const dst=resolveCountry("dest").split(" (")[0].trim();
  const rd=$("#f-record")?$("#f-record").value:"";
  function clean(s){return String(s||"").replace(/[\/\\:*?"<>|\n\r]+/g,"-").trim();}
  const base=[cn,jt,org,dst,rd].map(clean).filter(x=>x).join("_");
  return base||"เอกสารงาน";
}
async function handleAttachUpload(file){
  if(!file)return;
  if(!$("#f-cname")||!$("#f-cname").value.trim()){toast("กรุณากรอกชื่อลูกค้าก่อนอัปโหลดไฟล์","err");return;}
  if(!(driveToken&&Date.now()<driveTokenExp-60000)){
    toast("เซสชัน Google หมดอายุ — กดปุ่ม 'เชื่อมต่อ Google Drive' อีกครั้งก่อนอัปโหลด","err");paintAttachments();return;}
  const extM=(file.name||"").match(/\.[A-Za-z0-9]+$/);
  const n=formAttachments.length;
  const fname=attachFilenameBase()+(n>0?("_"+(n+1)):"")+(extM?extM[0]:"");
  toast("กำลังอัปโหลดขึ้น Google Drive...");
  try{
    const res=await driveUpload(file,fname);
    formAttachments.push({fileId:res.id,name:res.name||fname,
      link:res.webViewLink||("https://drive.google.com/file/d/"+res.id+"/view"),
      addedAt:new Date().toISOString()});
    paintAttachments();
    toast("อัปโหลดสำเร็จ: "+(res.name||fname),"ok");
  }catch(e){toast("อัปโหลดไม่สำเร็จ: "+(e&&e.message||e),"err");}
}

function refreshDriveTokenSilently(){
  if(!driveReady())return;
  if(typeof google==="undefined"||!google.accounts||!google.accounts.oauth2)return;
  try{
    const tc=google.accounts.oauth2.initTokenClient({

async function createCalendarEvent(job){
  const token=await ensureDriveToken();
  if(!job.travelDate)throw new Error("งานนี้ยังไม่มีวันเดินทาง — กรอกวันเดินทางก่อน");
  const t=JOB_TYPES[job.jobType]||{label:job.jobType||""};
  const summary="🐾 "+(job.jobNo||"")+" "+(t.label||"")+" — "+(job.customerName||"")+" • "+petsShort(job);
  const desc="📋 "+(job.jobNo||"-")+
    "\nลูกค้า: "+(job.customerName||"-")+" ("+(job.customerPhone||"-")+")"+
    "\nสัตว์เลี้ยง: "+petsShort(job)+
    "\nเส้นทาง: "+(job.originCountry||"?")+" → "+(job.destCountry||"?")+
    "\nผู้รับผิดชอบ: "+(job.assignee||"-")+
    "\n\n— สร้างจาก Convey Dashboard";
  const event={summary,description:desc,
    start:{date:job.travelDate},end:{date:job.travelDate},
    reminders:{useDefault:false,overrides:[{method:"popup",minutes:4320},{method:"popup",minutes:1440},{method:"email",minutes:1440}]}};
  const r=await fetch("https://www.googleapis.com/calendar/v3/calendars/primary/events",{
    method:"POST",headers:{Authorization:"Bearer "+token,"Content-Type":"application/json"},body:JSON.stringify(event)});
  if(!r.ok)throw new Error("สร้าง event ไม่สำเร็จ (HTTP "+r.status+") — ต้องเปิด Calendar API ใน Google Cloud ก่อน");
  return await r.json();
}
async function deleteCalendarEvent(eventId){
  const token=await ensureDriveToken();
  const r=await fetch("https://www.googleapis.com/calendar/v3/calendars/primary/events/"+encodeURIComponent(eventId),{

/* ============================ VACCINE VALIDATION ============================ */
function ageDaysAt(dob,d){const D=parseD(d),B=parseD(dob);if(!D||!B)return null;return daysBetween(D,B);}
function validatePet(pet,dir,cond,travelDate){
  pet=pet||{};dir=dir||"";cond=cond||"china";
  const dob=pet.dob;const imp=parseD(travelDate);
  const vax=pet.vax||{combined:[],lepto:[],rabies:[]};
  const res={rows:{combined:[],lepto:[],rabies:[]},micro:null,blood:null,extra:[]};

  ["combined","lepto"].forEach(grp=>{
    (vax[grp]||[]).forEach(v=>{
      if(!v.date){res.rows[grp].push({ok:null,msg:"ยังไม่ระบุวันที่ฉีด"});return;}
      if(dir!=="import"){res.rows[grp].push({ok:null,msg:"บันทึกแล้ว (เงื่อนไขตรวจเฉพาะงาน Import)"});return;}
      const a=ageDaysAt(dob,v.date);const exp=parseD(v.expiry);const probs=[];const okm=[];
      if(a===null)probs.push("ต้องระบุวันเกิดสัตว์เลี้ยง");
      else if(a<60)probs.push("ฉีดตอนอายุ "+a+" วัน — ต้อง ≥ 60 วัน (2 เดือน)");
      else okm.push("ฉีดตอนอายุ "+a+" วัน");
      if(exp&&imp){if(exp<imp)probs.push("วัคซีนหมดอายุก่อนวันนำเข้าไทย");else okm.push("ยังไม่หมดอายุ ณ วันนำเข้า");}
      else if(!exp)okm.push("ยังไม่ได้กรอกวันหมดอายุ");
      res.rows[grp].push({ok:probs.length?false:(a!==null?true:null),msg:(probs.concat(okm)).join(" • ")});
    });
  });

  const rb=vax.rabies||[];
  rb.forEach((v,i)=>{
    if(!v.date){res.rows.rabies.push({ok:null,msg:"ยังไม่ระบุวันที่ฉีด"});return;}
    const a=ageDaysAt(dob,v.date);const probs=[];const okm=[];
    if(dir==="import"){
      const exp=parseD(v.expiry);
      if(a===null)probs.push("ต้องระบุวันเกิดสัตว์เลี้ยง");
      else if(a<85)probs.push("ฉีดตอนอายุ "+a+" วัน — ต้อง ≥ 85 วัน (3 เดือน)");
      else okm.push("ฉีดตอนอายุ "+a+" วัน");
      if(exp&&imp){if(exp<imp)probs.push("วัคซีนหมดอายุก่อนวันนำเข้าไทย");else okm.push("ยังไม่หมดอายุ ณ วันนำเข้า");}
      else if(!exp)okm.push("ยังไม่ได้กรอกวันหมดอายุ");
    }else if(dir==="export"){
      if(cond==="general"){res.rows.rabies.push({ok:null,msg:"บันทึกแล้ว (ปลายทางทั่วไป — ไม่ตรวจเงื่อนไข)"});return;}
      if(i===0){
        if(a===null)probs.push("ต้องระบุวันเกิดสัตว์เลี้ยง");
        else if(a<85)probs.push("เข็มแรกฉีดตอนอายุ "+a+" วัน — ต้อง ≥ 85 วัน (3 เดือน)");
        else okm.push("เข็มแรก • อายุ "+a+" วัน");
      }else{
        const prev=parseD(rb[i-1].date);
        if(prev){const gap=daysBetween(parseD(v.date),prev);
          if(cond==="china"&&gap<30)probs.push("ห่างจากเข็มก่อนหน้า "+gap+" วัน — จีนต้อง ≥ 30 วัน");
          else okm.push("ห่างจากเข็มก่อนหน้า "+gap+" วัน");
        }else probs.push("เข็มก่อนหน้ายังไม่ระบุวันที่");
      }
    }else{res.rows.rabies.push({ok:null,msg:"เลือกทิศทางงาน (Import/Export) ก่อน"});return;}
    res.rows.rabies.push({ok:probs.length?false:(a!==null||i>0?true:null),msg:(probs.concat(okm)).join(" • ")});
  });

  if(dir==="export"){
    if(cond==="general"){
      res.micro=pet.microchipDate?{ok:null,msg:"บันทึกแล้ว (ไม่ตรวจเงื่อนไข)"}:{ok:null,msg:"ยังไม่ระบุวันที่ฝังไมโครชิพ"};
      res.blood=pet.bloodDate?{ok:null,msg:"บันทึกแล้ว (ไม่ตรวจเงื่อนไข)"}:{ok:null,msg:"ยังไม่ระบุวันที่เจาะเลือด"};
    }else{
      const mc=parseD(pet.microchipDate);const r0=parseD(rb[0]&&rb[0].date);
      if(!mc)res.micro={ok:null,msg:"ยังไม่ระบุวันที่ฝังไมโครชิพ"};
      else if(!r0)res.micro={ok:null,msg:"ยังไม่ระบุวัคซีนพิษสุนัขบ้าเข็มแรก"};
      else if(cond==="china"){const ok=daysBetween(mc,r0)<=0;
        res.micro={ok,msg:ok?"ฝังก่อน/วันเดียวกับวัคซีนพิษสุนัขบ้าเข็มแรก ✓":"จีน: ไมโครชิพต้องฝังก่อนหรือวันเดียวกับวัคซีนพิษสุนัขบ้าเข็มแรก"};}
      else{const ok=daysBetween(mc,r0)>=0;
        res.micro={ok,msg:ok?"ฝังหลัง/วันเดียวกับวัคซีนพิษสุนัขบ้าเข็มแรก ✓":"EU: ไมโครชิพต้องฝังหลังวัคซีนพิษสุนัขบ้าเข็มแรก"};}

      const bd=parseD(pet.bloodDate);
      if(cond==="china"){
        const r2=parseD(rb[1]&&rb[1].date);
        if(!bd)res.blood={ok:null,msg:"ยังไม่ระบุวันที่เจาะเลือด"};
        else if(!r2)res.blood={ok:null,msg:"จีนต้องมีวัคซีนพิษสุนัขบ้าครบ 2 เข็มก่อน"};
        else{const ok=daysBetween(bd,r2)>0;res.blood={ok,msg:ok?"เจาะเลือดหลังวัคซีนเข็มที่ 2 ✓":"จีน: ต้องเจาะเลือดหลังวัคซีนพิษสุนัขบ้าเข็มที่ 2"};}
        if(rb.length<2)res.extra.push({ok:false,msg:"จีน: ต้องฉีดวัคซีนพิษสุนัขบ้า 2 เข็ม (ห่างกัน ≥ 30 วัน)"});
      }else{
        res.blood=bd?{ok:true,msg:"บันทึกวันที่เจาะเลือดแล้ว"}:{ok:null,msg:"ยังไม่ระบุวันที่เจาะเลือด"};
        if(rb.length<1||!rb[0].date)res.extra.push({ok:false,msg:"EU: ต้องฉีดวัคซีนพิษสุนัขบ้า 1 เข็ม"});
      }
    }
  }
  return res;
}
function vaxOverall(res){
  let any=false,fail=false;
  Object.values(res.rows).forEach(arr=>arr.forEach(r=>{if(r.ok===false)fail=true;if(r.ok===true)any=true;}));
  [res.micro,res.blood].forEach(r=>{if(r){if(r.ok===false)fail=true;if(r.ok===true)any=true;}});
  res.extra.forEach(r=>{if(r.ok===false)fail=true;});
  if(fail)return false;if(any)return true;return null;
}
function jobVaxOverall(job){
  if(!job.vaccineDir)return null;
  if(job.vaccineDir==="export"&&job.exportCond==="general")return "general";
  const pets=job.pets||[];
  let any=false,fail=false;
  pets.forEach(p=>{const o=vaxOverall(validatePet(p,job.vaccineDir,job.exportCond,job.travelDate));
    if(o===false)fail=true;if(o===true)any=true;});
  if(fail)return false;if(any)return true;return null;
}

/* ============================ PROGRESS ============================ */
function jobItems(job){const t=JOB_TYPES[job.jobType];return{docs:t.docs||[],steps:t.steps||[]};}
function progressOf(job){
  const it=jobItems(job);let done=0,total=0;
  ["docs","steps"].forEach(k=>{it[k].forEach((_,i)=>{total++;const c=job.checklist&&job.checklist[k]&&job.checklist[k][i];if(c&&c.done)done++;});});
  if(isClosed(job))return{done:total,total:total,pct:100};
  return{done,total,pct:total?Math.round(done/total*100):0};
}
function isClosed(job){
  const steps=jobItems(job).steps;
  if(!steps.length)return false;
  const c=job.checklist&&job.checklist.steps&&job.checklist.steps[steps.length-1];
  return !!(c&&c.done);
}

/* ============================ FILTERS ============================ */
function applyFilters(jobs,f){
  return jobs.filter(j=>{
    if(f.f_type&&j.jobType!==f.f_type)return false;
    if(f.f_name&&!(j.customerName||"").toLowerCase().includes(f.f_name.toLowerCase()))return false;
    const _df=f.f_datefield==="record"?(j.recordDate||""):(j.travelDate||"");
    if(f.f_from&&_df<f.f_from)return false;
    if(f.f_to&&_df>f.f_to)return false;
    if(f.f_paid==="paid"&&!j.paid)return false;
    if(f.f_paid==="unpaid"&&j.paid)return false;
    if(f.f_stat==="closed"&&!isClosed(j))return false;
    if(f.f_stat==="open"&&isClosed(j))return false;
    if(f.f_assignee&&!(j.assignee||"").toLowerCase().includes(f.f_assignee.toLowerCase()))return false;
    return true;
  });
}
function fldInput(lbl,key,type,val,ph){
  return '<div class="fld"><label>'+lbl+'</label><input type="'+type+'" data-act="filter" data-key="'+key+'" value="'+esc(val||"")+'" placeholder="'+(ph||"")+'"></div>';
}
function fldSelect(lbl,key,opts,val){
  let o=opts.map(p=>'<option value="'+esc(p[0])+'"'+(val===p[0]?" selected":"")+'>'+esc(p[1])+'</option>').join("");
  return '<div class="fld"><label>'+lbl+'</label><select data-act="filter" data-key="'+key+'">'+o+'</select></div>';
}

function refreshPetVax(idx){
  const p=formPets[idx];if(!p)return;
  setBE("be-p"+idx+"-dob",p.dob);
  if(document.getElementById("be-p"+idx+"-micro"))setBE("be-p"+idx+"-micro",p.micro);
  if(document.getElementById("be-p"+idx+"-blood"))setBE("be-p"+idx+"-blood",p.blood);
  ["combined","lepto","rabies"].forEach(grp=>{
    (p.vax[grp]||[]).forEach((v,i)=>{setBE("be-"+idx+"-"+grp+"-"+i+"-date",v.date);setBE("be-"+idx+"-"+grp+"-"+i+"-expiry",v.expiry);});
  });
  const dir=getDir();const cond=dir==="export"?getCond():"";
  const travel=$("#f-travel")?$("#f-travel").value:"";
  const res=validatePet(p,dir,cond,travel);
  ["combined","lepto","rabies"].forEach(grp=>{
    res.rows[grp].forEach((r,i)=>{const el=$("#st-"+idx+"-"+grp+"-"+i);if(el)el.innerHTML=stIcon(r);});
  });
  let items=[];
  ["combined","lepto","rabies"].forEach(grp=>{
    res.rows[grp].forEach((r,i)=>{if(r.ok!=null||r.msg)items.push({label:VAX_GROUPS[grp].split(" (")[0]+" เข็มที่ "+(i+1),r:r});});
  });
  if(dir==="export"){
    if(res.micro)items.push({label:"วันที่ฝังไมโครชิพ",r:res.micro});
    if(res.blood)items.push({label:"วันที่เจาะเลือด",r:res.blood});
    res.extra.forEach(r=>items.push({label:"เงื่อนไขประเทศ",r:r}));
  }
  const overall=vaxOverall(res);
  let cls=overall===true?"ok":overall===false?"no":"na";
  let head=overall===true?"✅ วัคซีนผ่านเงื่อนไขทั้งหมด":overall===false?"❌ วัคซีนยังไม่ผ่านเงื่อนไข — ตรวจสอบรายการด้านล่าง":"⏳ รอข้อมูลครบเพื่อตรวจสอบ";
  if(dir==="export"&&cond==="general"){cls="na";head="ℹ️ ปลายทางทั่วไป — บันทึกข้อมูลวัคซีนไว้ ไม่ตรวจเงื่อนไขอัตโนมัติ";}
  if(!dir){cls="na";head="⏳ เลือกทิศทางงาน (Import/Export) ด้านบนก่อนเพื่อตรวจสอบ";}
  let h='<div class="vax-result '+cls+'"><b>'+head+'</b>';
  if(items.length){h+='<ul>';items.forEach(it=>{h+='<li>'+stIcon(it.r)+'<span><b>'+esc(it.label)+':</b> '+esc(it.r.msg||"-")+'</span></li>';});h+='</ul>';}
  h+='</div>';
  const box=$("#vaxResult-"+idx);if(box)box.innerHTML=h;
}

  job.originCountry=resolveCountry("origin");
  job.destCountry=resolveCountry("dest");
  job.jobType=jtype;
  job.vaccineDir=dir;
  job.travelDate=$("#f-travel").value;
  job.recordDate=($("#f-record")&&$("#f-record").value)||todayStr();
  job.assignee=$("#f-assignee")?$("#f-assignee").value.trim():"";
  const payR=document.querySelector('input[name=paystat]:checked');
  job.paid=payR?payR.value==="pay":false;
  job.sellPrice=parseFloat($("#f-sell")?$("#f-sell").value:"")||0;
  job.costs=formCosts.filter(c=>c.cat||(c.amount!==""&&c.amount!=null)).map(c=>({cat:c.cat,amount:parseFloat(c.amount)||0}));
  job.paidDate=(job.paid&&$("#f-paiddate"))?$("#f-paiddate").value:"";
  job.exportCond=dir==="export"?getCond():"";
  job.notes=$("#f-notes").value.trim();
  job.attachments=formAttachments.slice();
  syncPetsFromDOM();
  job.pets=formPets.map(p=>{
    let breed="",breedMix="";
    if(p.breedSel===MIXED_BREED){breed=MIXED_BREED;breedMix=(p.breedExtra||"").trim();}
    else if(p.breedSel===OTHER_BREED){breed=(p.breedExtra||"").trim();}
    else{breed=(p.breedSel||"").trim();}
    return{name:(p.name||"").trim(),microchip:(p.microchip||"").trim(),color:(p.color||"").trim(),
      sex:p.sex||"",dob:p.dob||"",species:p.species||"",breed:breed,breedMix:breedMix,
      vax:{combined:p.vax.combined.map(v=>({date:v.date,expiry:v.expiry})),
           lepto:p.vax.lepto.map(v=>({date:v.date,expiry:v.expiry})),
           rabies:p.vax.rabies.map(v=>({date:v.date,expiry:v.expiry}))},
      microchipDate:dir==="export"?(p.micro||""):"",
      bloodDate:dir==="export"?(p.blood||""):""};
  });
  delete job.pet;delete job.vax;delete job.microchipDate;delete job.bloodDate;
  // checklist init / preserve
  if(!job.checklist||prevType!==jtype){
    job.checklist={docs:{},steps:{}};
    const t=JOB_TYPES[jtype];
    (t.docs||[]).forEach((_,i)=>job.checklist.docs[i]={done:false,date:""});
    (t.steps||[]).forEach((_,i)=>job.checklist.steps[i]={done:false,date:""});
  }
  return job;
}

document.addEventListener("click",e=>{
  const el=e.target.closest("[data-act]");if(!el)return;

  if(act==="nav"){STATE.view=el.dataset.view;STATE.dupFrom=null;if(el.dataset.view==="new")STATE.editId=null;STATE.filters={};render();window.scrollTo(0,0);}
  else if(act==="clearfilter"){STATE.filters={};render();}

  else if(act==="toggle"){toggleStep(el.dataset.id,el.dataset.kind,+el.dataset.idx);}
  else if(act==="paid"){const j=getJob(el.dataset.id);if(j){j.paid=!j.paid;persistJob(j);render();}}
  else if(act==="edit"){STATE.editId=el.dataset.id;STATE.dupFrom=null;STATE.view="new";render();window.scrollTo(0,0);}
  else if(act==="dup"){STATE.editId=null;STATE.dupFrom=el.dataset.id;STATE.view="new";STATE.filters={};render();window.scrollTo(0,0);}
  else if(act==="open"){const j=getJob(el.dataset.id);if(j){STATE.view="job:"+j.jobType;STATE.filters={};render();window.scrollTo(0,0);}}
  else if(act==="pdf"){generatePDF(el.dataset.id);}
  else if(act==="del"){const j=getJob(el.dataset.id);
    if(j&&confirm("ลบงานของ \""+(j.customerName||"-")+"\" ?")){deleteJob(el.dataset.id);toast("ลบงานแล้ว");render();}}
  else if(act==="addvax"){syncPetsFromDOM();formPets[+el.dataset.pet].vax[el.dataset.grp].push({date:"",expiry:""});renderPets();}
  else if(act==="rmvax"){syncPetsFromDOM();formPets[+el.dataset.pet].vax[el.dataset.grp].splice(+el.dataset.i,1);renderPets();}
  else if(act==="addpet"){syncPetsFromDOM();formPets.push(blankFormPet());renderPets();}
  else if(act==="rmpet"){syncPetsFromDOM();formPets.splice(+el.dataset.pet,1);renderPets();}
  else if(act==="addcost"){formCosts.push({cat:"",amount:""});paintCosts();refreshFinance();}
  else if(act==="rmcost"){formCosts.splice(+el.dataset.i,1);paintCosts();refreshFinance();}
  else if(act==="savejob"){saveJobFromForm();}
  else if(act==="export"){doExport();}
  else if(act==="importbtn"){$("#importFile").click();}
  else if(act==="cloud-save"){cloudSave();}
  else if(act==="cloud-pull"){cloudPull(false).then(()=>render());}
  else if(act==="cloud-push"){cloudPush();}
  else if(act==="cloud-off"){DB.cloud.enabled=false;saveLocal();toast("ตัดการเชื่อมต่อ Cloud แล้ว");render();}
  else if(act==="drive-save"){driveSave();}
  else if(act==="drive-off"){DB.drive.enabled=false;saveLocal();toast("ตัดการเชื่อมต่อ Google Drive แล้ว");render();}
  else if(act==="driveconnect"){ensureDriveToken().then(()=>{paintAttachments();toast("เชื่อมต่อ Google Drive แล้ว — กดอัปโหลดได้เลย","ok");}).catch(e=>toast("เชื่อมต่อ Google ไม่สำเร็จ: "+(e&&e.message||e),"err"));}
  else if(act==="attachup"){const fi=$("#attachFile");if(fi)fi.click();}
  else if(act==="attachrm"){formAttachments.splice(+el.dataset.i,1);paintAttachments();}
  else if(act==="calcreate"||act==="calupdate"){
    const j=getJob(STATE.editId);if(!j){toast("ต้องบันทึกงานก่อน","err");return;}
    if(!j.travelDate){toast("งานนี้ยังไม่มีวันเดินทาง","err");return;}
    (async()=>{
      try{
        if(j.calendarEvent&&j.calendarEvent.id&&act==="calupdate"){try{await deleteCalendarEvent(j.calendarEvent.id);}catch(e){}}
        toast("กำลังสร้าง event ใน Google Calendar...");
        const ev=await createCalendarEvent(j);
        j.calendarEvent={id:ev.id,link:ev.htmlLink||"",createdAt:new Date().toISOString()};
        persistJob(j);paintCalendar();toast("ตั้งเตือนใน Calendar สำเร็จ ✓","ok");
      }catch(e){toast("ไม่สำเร็จ: "+(e&&e.message||e),"err");}
    })();
  }
  else if(act==="caldelete"){
    const j=getJob(STATE.editId);if(!j||!j.calendarEvent||!j.calendarEvent.id)return;
    if(!confirm("ลบ event ใน Google Calendar?"))return;
    (async()=>{
      try{await deleteCalendarEvent(j.calendarEvent.id);}catch(e){}
      j.calendarEvent=null;persistJob(j);paintCalendar();toast("ลบ event แล้ว","ok");
    })();
  }
  else if(act==="wipe"){if(confirm("ยืนยันลบข้อมูลทั้งหมดในเครื่องนี้?")){DB.jobs=[];saveLocal();toast("ลบข้อมูลแล้ว");render();}}
});

function toggleStep(id,kind,idx){
  const j=getJob(id);if(!j)return;
  if(!j.checklist)j.checklist={docs:{},steps:{}};
  if(!j.checklist[kind])j.checklist[kind]={};
  const c=j.checklist[kind][idx]||{done:false,date:""};
  c.done=!c.done;
  if(c.done&&!c.date)c.date=todayStr();
  j.checklist[kind][idx]=c;
  persistJob(j);render();
}

  if(!$("#f-cname").value.trim()){toast("กรุณากรอกชื่อลูกค้า","err");$("#f-cname").focus();return;}
  const job=readFormJob();

function doExport(){
  const blob=new Blob([JSON.stringify(DB,null,2)],{type:"application/json"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);
  a.download="convey-dashboard-backup-"+todayStr()+".json";a.click();
  toast("Export ไฟล์สำรองแล้ว","ok");
}
function handleImport(file){
  if(!file)return;
  const rd=new FileReader();
  rd.onload=()=>{
    try{const d=JSON.parse(rd.result);
      if(!d.jobs||!Array.isArray(d.jobs))throw new Error("ไฟล์ไม่ถูกต้อง");
      if(!confirm("นำเข้า "+d.jobs.length+" งาน? ข้อมูลเดิมในเครื่องจะถูกแทนที่"))return;
      DB.jobs=d.jobs;DB.jobs.forEach(migrateJobPets);if(d.cloud)DB.cloud=Object.assign(DB.cloud,d.cloud);
      saveLocal();toast("นำเข้าข้อมูลสำเร็จ","ok");render();
    }catch(err){toast("นำเข้าไม่สำเร็จ: "+err.message,"err");}
  };
  rd.readAsText(file);
}
function cloudSave(){
  const url=$("#cl-url").value.trim(),key=$("#cl-key").value.trim();
  if(!url||!key){toast("กรอก URL และ key ให้ครบ","err");return;}
  DB.cloud={url,key,enabled:true};saveLocal();
  toast("กำลังทดสอบการเชื่อมต่อ...");
  cloudPull(true).then(ok=>{
    if(ok){toast("เชื่อมต่อ Cloud สำเร็จ ✓","ok");}
    else{DB.cloud.enabled=false;saveLocal();toast("เชื่อมต่อไม่สำเร็จ ตรวจสอบ URL/key และตาราง SQL","err");}
    render();
  });
}

  const p=progressOf(j);const it=jobItems(j);const pets=j.pets||[];
  const condTxt=j.vaccineDir==="export"?({china:"ประเทศจีน (China)",eu:"EU Countries",general:"ทั่วไป (ไม่ตรวจเงื่อนไข)"}[j.exportCond]||"-"):(j.vaccineDir==="import"?"นำเข้าประเทศไทย":"-");
  const dirTxt=j.vaccineDir==="import"?"Import (นำเข้าประเทศไทย)":j.vaccineDir==="export"?"Export (ออกจากประเทศไทย)":"-";
  const travelLbl=j.vaccineDir==="import"?"วันเดินทางเข้าไทย":j.vaccineDir==="export"?"วันเดินทางออกจากไทย":"วันเดินทาง";
  function dt(s){return s?(fmtCE(s)+" / พ.ศ. "+toBE(s)):"-";}
  function row(k,v){return '<div><b>'+esc(k)+'</b><span>'+v+'</span></div>';}
  function stTxt(r){if(!r)return '<span class="na">-</span>';
    if(r.ok===true)return '<span class="ok">✔ ผ่าน</span> '+esc(r.msg||"");
    if(r.ok===false)return '<span class="no">✘ ไม่ผ่าน</span> '+esc(r.msg||"");
    return '<span class="na">'+esc(r.msg||"-")+'</span>';}

  let petsHTML="";
  pets.forEach((pet,idx)=>{
    petsHTML+='<div class="sec"><h3>สัตว์เลี้ยงตัวที่ '+(idx+1)+(pet.name?(' — '+esc(pet.name)):'')+'</h3><div class="kv">'+
      row("ชื่อสัตว์เลี้ยง",esc(pet.name||"-"))+row("ประเภท",esc(pet.species||"-"))+
      row("สายพันธุ์",esc(breedDisplay(pet)||"-"))+row("หมายเลขไมโครชิพ",esc(pet.microchip||"-"))+
      row("สี",esc(pet.color||"-"))+row("เพศ",esc(pet.sex||"-"))+
      row("วันเดือนปีเกิด",dt(pet.dob))+'</div>';
    if(j.vaccineDir){
      const res=validatePet(pet,j.vaccineDir,j.exportCond,j.travelDate);
      let vrows="";
      [["combined","วัคซีนรวม"],["lepto","วัคซีนป้องกันฉี่หนู"],["rabies","วัคซีนพิษสุนัขบ้า"]].forEach(g=>{
        ((pet.vax&&pet.vax[g[0]])||[]).forEach((v,i)=>{
          if(!v.date&&!v.expiry)return;
          const r=(res.rows[g[0]]||[])[i]||null;
          vrows+='<tr><td>'+esc(g[1])+'</td><td>เข็มที่ '+(i+1)+'</td><td>'+dt(v.date)+'</td><td>'+(v.expiry?dt(v.expiry):"-")+'</td><td>'+stTxt(r)+'</td></tr>';
        });
      });
      if(j.vaccineDir==="export"){
        if(res.micro)vrows+='<tr><td colspan="2">วันที่ฝังไมโครชิพ</td><td colspan="2">'+dt(pet.microchipDate)+'</td><td>'+stTxt(res.micro)+'</td></tr>';
        if(res.blood)vrows+='<tr><td colspan="2">วันที่เจาะเลือด</td><td colspan="2">'+dt(pet.bloodDate)+'</td><td>'+stTxt(res.blood)+'</td></tr>';
      }
      const ov=vaxOverall(res);
      const ovTxt=(j.vaccineDir==="export"&&j.exportCond==="general")?'<span class="na">บันทึกข้อมูลไว้ — ไม่ตรวจเงื่อนไข</span>':
        ov===true?'<span class="ok">✔ ผ่านเงื่อนไขทั้งหมด</span>':ov===false?'<span class="no">✘ ยังไม่ผ่านเงื่อนไข</span>':'<span class="na">— รอข้อมูลเพิ่มเติม</span>';
      petsHTML+='<p style="margin-top:9px;font-weight:700;font-size:11.5px">💉 วัคซีน</p>'+
        (vrows?'<table><thead><tr><th>ประเภทวัคซีน</th><th>รายการ</th><th>วันที่ฉีด</th><th>วันหมดอายุ</th><th>ผลตรวจเงื่อนไข</th></tr></thead><tbody>'+vrows+'</tbody></table>':'<p style="margin-top:6px;color:#999;font-size:11px">ยังไม่มีข้อมูลวัคซีน</p>')+
        '<p style="margin-top:7px;font-size:11.5px"><b>สรุปผลวัคซีน: </b>'+ovTxt+'</p>';
    }
    petsHTML+='</div>';
  });

  const total=jobCostTotal(j);const profit=jobProfit(j);
  let costRows=(j.costs||[]).map(c=>'<tr><td>'+esc(c.cat||"-")+'</td><td class="tot">'+money(c.amount)+'</td></tr>').join("");
  if(!costRows)costRows='<tr><td colspan="2" style="color:#999">ไม่มีรายการต้นทุน</td></tr>';
  const finHTML='<div class="sec"><h3>การเงิน</h3>'+
    '<table><thead><tr><th>รายการต้นทุน</th><th class="tot">จำนวนเงิน</th></tr></thead><tbody>'+costRows+
    '<tr><td class="tot">รวมต้นทุนทั้งหมด</td><td class="tot">'+money(total)+'</td></tr></tbody></table>'+
    '<div class="kv" style="margin-top:8px">'+
    row("ราคาขายลูกค้า","<b>"+money(j.sellPrice)+"</b>")+
    row("กำไรสุทธิ",'<b class="'+(profit<0?"no":"ok")+'">'+money(profit)+'</b>')+
    row("สถานะการเงิน",j.paid?'<span class="ok">รับเงินแล้ว (Pay)</span>':'<span class="no">ค้างจ่าย (Un-Pay)</span>')+
    row("วันที่ได้รับเงิน",(j.paid&&j.paidDate)?dt(j.paidDate):"-")+
    '</div></div>';

  function clTable(kind,label,items){
    if(!items||!items.length)return"";
    let r="";
    items.forEach((name,i)=>{
      const c=(j.checklist&&j.checklist[kind]&&j.checklist[kind][i])||{done:false,date:""};
      r+='<tr><td>'+(kind==="steps"?(i+1)+". ":"")+esc(name)+'</td><td>'+(c.done?'<span class="ok">✔ เสร็จแล้ว</span>':'<span class="na">○ ยังไม่ทำ</span>')+'</td><td>'+(c.date?fmtCE(c.date):"-")+'</td></tr>';
    });
    return '<p style="margin-top:9px;font-weight:700;font-size:11.5px">'+esc(label)+'</p>'+
      '<table><thead><tr><th>รายการ</th><th>สถานะ</th><th>วันที่</th></tr></thead><tbody>'+r+'</tbody></table>';
  }
  const clHTML='<div class="sec"><h3>สถานะการดำเนินงาน — คืบหน้า '+p.done+'/'+p.total+' ('+p.pct+'%)</h3>'+
    clTable("docs","เอกสารที่ได้รับ",it.docs)+clTable("steps","ขั้นตอนการทำงาน",it.steps)+'</div>';

  const css="*{margin:0;padding:0;box-sizing:border-box;}"+
    "body{font-family:'Leelawadee UI','Sarabun','Noto Sans Thai',Tahoma,sans-serif;color:#1a1a1a;font-size:13px;line-height:1.5;background:#e8e8e8;}"+
    ".pbtn{display:block;margin:16px auto;padding:9px 22px;background:#0d9488;color:#fff;border:none;border-radius:6px;font-size:13px;cursor:pointer;font-family:inherit;}"+
    ".rpt{max-width:780px;margin:0 auto 30px;background:#fff;padding:30px 34px;box-shadow:0 2px 12px rgba(0,0,0,.15);}"+
    ".rpt-head{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:3px solid #ea580c;padding-bottom:10px;}"+
    ".rpt-head .co{font-size:17px;font-weight:800;color:#ea580c;}"+
    ".rpt-head .co small{display:block;font-size:10.5px;color:#666;font-weight:400;margin-top:2px;}"+
    ".rpt-head .jn{text-align:right;}.rpt-head .jn .no{font-size:17px;font-weight:800;color:#ea580c;}.rpt-head .jn small{font-size:10px;color:#666;}"+
    ".rpt-title{font-size:14px;font-weight:700;margin:12px 0;}"+
    ".sec{margin-top:15px;}"+
    ".sec h3{font-size:12px;font-weight:700;background:#0d9488;color:#fff;padding:5px 10px;border-radius:4px;}"+
    "table{width:100%;border-collapse:collapse;margin-top:7px;}"+
    "th,td{border:1px solid #ccc;padding:5px 8px;text-align:left;font-size:11px;vertical-align:top;}"+
    "th{background:#f0f0f0;font-weight:700;}"+
    ".kv{display:grid;grid-template-columns:1fr 1fr;gap:0 22px;margin-top:7px;}"+
    ".kv>div{display:flex;padding:4px 2px;border-bottom:1px dotted #ddd;font-size:11.5px;}"+
    ".kv>div b{min-width:118px;color:#555;font-weight:600;}"+
    ".ok{color:#15803d;font-weight:700;}.no{color:#dc2626;font-weight:700;}.na{color:#999;}"+
    ".tot{text-align:right;font-weight:700;}"+
    ".foot{margin-top:24px;border-top:1px solid #ccc;padding-top:9px;font-size:10px;color:#999;text-align:center;}"+
    "@media print{body{background:#fff;}.pbtn{display:none;}.rpt{margin:0;padding:0;max-width:100%;box-shadow:none;}"+
    ".sec{break-inside:avoid;page-break-inside:avoid;}.sec h3{break-after:avoid;page-break-after:avoid;}"+
    "table{break-inside:auto;}tr{break-inside:avoid;page-break-inside:avoid;}thead{display:table-header-group;}"+
    ".kv{break-inside:avoid;page-break-inside:avoid;}.kv>div{break-inside:avoid;page-break-inside:avoid;}"+
    ".rpt-head{break-inside:avoid;page-break-inside:avoid;}}"+
    "@page{size:A4;margin:13mm;}";

  let html='<!DOCTYPE html><html lang="th"><head><meta charset="UTF-8"><title>รายงาน '+esc(j.jobNo||"")+'</title><style>'+css+'</style></head><body>';
  html+='<button class="pbtn" onclick="window.print()">🖨 บันทึกเป็น PDF / พิมพ์รายงาน</button>';
  html+='<div class="rpt">';
  html+='<div class="rpt-head"><div class="co">Convey Pet Relocation Service<small>บริการนำเข้า-ส่งออกสัตว์เลี้ยงระหว่างประเทศ แบบ One-Stop Service</small></div>'+
    '<div class="jn"><div class="no">'+esc(j.jobNo||"-")+'</div><small>วันที่ออกรายงาน<br>'+fmtCE(todayStr())+'</small></div></div>';
  html+='<div class="rpt-title">รายงานสรุปงาน — '+esc(t.label)+'</div>';
  html+='<div class="sec"><h3>ข้อมูลงาน & ลูกค้า</h3><div class="kv">'+
    row("เลขที่งาน","<b>"+esc(j.jobNo||"-")+"</b>")+row("ประเภทงาน",esc(t.label))+
    row("ทิศทางงาน",dirTxt)+row("เงื่อนไขปลายทาง",esc(condTxt))+
    row("สถานะงาน",isClosed(j)?'<span class="ok">ปิดจ๊อบแล้ว</span>':"กำลังดำเนินการ")+
    row("จำนวนสัตว์เลี้ยง",pets.length+" ตัว")+
    row("ชื่อลูกค้า",esc(j.customerName||"-"))+row("เบอร์โทรศัพท์",esc(j.customerPhone||"-"))+
    row("ผู้รับผิดชอบ",esc(j.assignee||"-"))+
    row("ประเทศต้นทาง",esc(j.originCountry||"-"))+row("ประเทศปลายทาง",esc(j.destCountry||"-"))+
    row(travelLbl,dt(j.travelDate))+row("วันที่บันทึกงาน",dt(j.recordDate))+
    '</div></div>';
  html+=petsHTML+finHTML+clHTML;
  if(j.notes)html+='<div class="sec"><h3>หมายเหตุ</h3><p style="margin-top:6px;font-size:11.5px;white-space:pre-wrap">'+esc(j.notes)+'</p></div>';
  html+='<div class="foot">เอกสารนี้สร้างอัตโนมัติจากระบบ Convey Dashboard • '+fmtCE(todayStr())+' (พ.ศ. '+toBE(todayStr())+')</div>';
  html+='</div>';
  html+='<scr'+'ipt>setTimeout(function(){window.print();},450);</scr'+'ipt>';
  html+='</body></html>';
  return html;
}
function generatePDF(id){
  const j=getJob(id);
  if(!j){toast("ไม่พบข้อมูลงาน","err");return;}
  const w=window.open("","_blank");
  if(!w){toast("เบราว์เซอร์บล็อก pop-up — กรุณาอนุญาต pop-up ของหน้านี้ แล้วลองใหม่","err");return;}
  w.document.write(buildReportHTML(j));
  w.document.close();
  toast("เปิดหน้ารายงาน "+(j.jobNo||"")+' แล้ว — เลือก "Save as PDF" ในหน้าต่างพิมพ์',"ok");
}

/* ============================ INIT ============================ */
loadLocal();
backfillJobNos();
render();
if(DB.cloud.enabled){cloudPull(true).then(ok=>{if(ok){backfillJobNos();render();}});}
startDriveAutoRefresh();
</script>
