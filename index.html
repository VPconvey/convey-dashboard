<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Convey Pet Relocation — Dashboard งาน</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23ea580c'/%3E%3Ccircle cx='32' cy='42' r='12' fill='white'/%3E%3Ccircle cx='17' cy='28' r='5.5' fill='white'/%3E%3Ccircle cx='47' cy='28' r='5.5' fill='white'/%3E%3Ccircle cx='12' cy='42' r='4.5' fill='white'/%3E%3Ccircle cx='52' cy='42' r='4.5' fill='white'/%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23ea580c'/%3E%3Ccircle cx='32' cy='42' r='12' fill='white'/%3E%3Ccircle cx='17' cy='28' r='5.5' fill='white'/%3E%3Ccircle cx='47' cy='28' r='5.5' fill='white'/%3E%3Ccircle cx='12' cy='42' r='4.5' fill='white'/%3E%3Ccircle cx='52' cy='42' r='4.5' fill='white'/%3E%3C/svg%3E">
<meta name="theme-color" content="#ea580c">
<style>
:root{
  --bg:#eef2f6;--card:#ffffff;--ink:#0f172a;--mut:#64748b;--line:#e2e8f0;
  --brand:#0d9488;--brand-d:#0f766e;--brand-l:#ccfbf1;
  --done:#16a34a;--done-l:#dcfce7;--gray:#cbd5e1;--gray-l:#f1f5f9;
  --red:#dc2626;--red-l:#fee2e2;--amber:#d97706;--amber-l:#fef3c7;--blue:#2563eb;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{font-family:'Leelawadee UI','Sarabun','Noto Sans Thai',-apple-system,'Segoe UI',Tahoma,sans-serif;
  background:var(--bg);color:var(--ink);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;}
#app{display:flex;min-height:100vh;}

/* Sidebar */
aside{width:236px;background:#0f172a;color:#cbd5e1;flex-shrink:0;display:flex;flex-direction:column;
  position:sticky;top:0;height:100vh;}
.logo{padding:18px 18px 14px;border-bottom:1px solid #1e293b;}
.logo b{color:#fff;font-size:15px;display:block;}
.logo span{font-size:11px;color:#64748b;}
nav{padding:8px;overflow-y:auto;flex:1;}
.nav-sec{font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;color:#475569;padding:12px 12px 5px;}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 11px;border-radius:8px;cursor:pointer;
  font-size:13.5px;color:#cbd5e1;margin-bottom:1px;transition:.12s;}
.nav-item:hover{background:#1e293b;color:#fff;}
.nav-item.active{background:var(--brand);color:#fff;font-weight:600;}
.nav-item .ic{width:20px;text-align:center;font-size:14px;}
.nav-item .cnt{margin-left:auto;background:#1e293b;color:#94a3b8;font-size:11px;
  padding:1px 7px;border-radius:10px;}
.nav-item.active .cnt{background:rgba(255,255,255,.22);color:#fff;}

/* Main */
main{flex:1;min-width:0;display:flex;flex-direction:column;}
.topbar{background:var(--card);border-bottom:1px solid var(--line);padding:14px 26px;
  display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:30;}
.topbar h1{font-size:18px;font-weight:700;}
.topbar .sub{font-size:12px;color:var(--mut);}
.topbar .right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.content{padding:22px 26px 60px;}

/* Buttons */
.btn{border:1px solid var(--line);background:var(--card);color:var(--ink);padding:8px 14px;
  border-radius:8px;cursor:pointer;font-size:13px;font-family:inherit;font-weight:500;transition:.12s;
  text-decoration:none;display:inline-block;}
.attach-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-top:1px dashed var(--line);font-size:12.5px;}
.urgent-card{background:var(--card);border:1px solid var(--line);border-left:4px solid #d97706;border-radius:12px;padding:14px 16px;margin-bottom:18px;}
.dup-warn{background:#fef2f2;border:1px solid #fecaca;border-left:4px solid #dc2626;border-radius:12px;padding:12px 16px;margin-bottom:18px;font-size:13.5px;color:#7f1d1d;line-height:1.9;}
.chip-dup{background:#fffbeb;border:1px solid #fde68a;border-radius:8px;padding:7px 10px;margin-top:5px;font-size:12px;color:#92400e;line-height:1.8;}
.chip-info{background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;padding:7px 10px;margin-top:5px;font-size:12px;color:#1e40af;line-height:1.8;}
.month-bar{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px 14px;margin-bottom:14px;}
.month-bar label{font-size:13px;font-weight:700;}
.month-bar select{padding:6px 10px;border:1px solid var(--line);border-radius:8px;font-size:13.5px;font-weight:600;background:#fff;}
.rem-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap;padding:7px 0;border-bottom:1px dashed var(--line);font-size:13px;}
#syncBadge{cursor:pointer;background:#fef2f2;border:1px solid #fecaca;color:#b91c1c;border-radius:999px;padding:4px 12px;font-size:12px;font-weight:700;align-items:center;}
.urgent-head{font-size:14px;font-weight:700;margin-bottom:10px;color:#92400e;display:flex;align-items:center;gap:8px;}
.urgent-list{display:flex;flex-direction:column;gap:6px;}
.urgent-row{display:flex;align-items:center;gap:10px;padding:8px 11px;background:#f8fafc;border-radius:8px;cursor:pointer;font-size:12.5px;flex-wrap:wrap;transition:.12s;}
.urgent-row:hover{background:#eef2f6;}
.urgent-countdown{padding:3px 10px;border-radius:14px;font-size:11px;font-weight:700;white-space:nowrap;min-width:90px;text-align:center;}
.urgent-countdown.overdue{background:var(--red);color:#fff;}
.urgent-countdown.today{background:#d97706;color:#fff;}
.urgent-countdown.warn{background:#fed7aa;color:#9a3412;}
.urgent-countdown.soft{background:#fef3c7;color:#854d0e;}
.urgent-countdown.ok{background:var(--gray-l);color:var(--mut);}
.urgent-meta{flex:1;min-width:240px;}
.urgent-meta b{color:var(--brand-d);}
.urgent-assignee{font-size:11px;color:var(--brand-d);font-weight:600;}
.urgent-travel{font-size:11px;color:var(--mut);}
.team-row{display:grid;grid-template-columns:1fr 1.6fr 36px;gap:7px;margin-bottom:6px;}
/* Job card view */
.viewtog{display:flex;align-items:center;gap:6px;margin-bottom:12px;}
.jcard{background:var(--card);border:1px solid var(--line);border-radius:12px;margin-bottom:10px;}
.jcard.closed{opacity:.62;}
.jcard-head{display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer;flex-wrap:wrap;border-radius:12px;transition:.12s;}
.jcard-head:hover{background:#f8fafc;}
.jc-caret{color:var(--mut);font-size:12px;width:14px;text-align:center;flex:none;}
.jc-id{min-width:190px;}
.jc-id b{color:var(--brand-d);}
.jc-next{background:#eff6ff;color:#1e40af;border:1px solid #bfdbfe;font-size:11px;font-weight:600;padding:3px 10px;border-radius:12px;white-space:nowrap;}
.jc-actions{margin-left:auto;display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.jcard-foot{padding:0 14px 11px 38px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
.jcard-foot .pwrap{flex:1;min-width:160px;}
.jc-fin{display:flex;align-items:center;gap:7px;font-size:12.5px;white-space:nowrap;flex:none;}
.jc-fin .k{color:var(--mut);font-weight:600;font-size:11px;margin-right:3px;}
.jc-fin b{font-weight:700;color:#334155;font-variant-numeric:tabular-nums;}
.jc-fin-sep{color:#cbd5e1;font-weight:700;}
.jc-fin .pos b{color:#16a34a;}
.jc-fin .neg b{color:#dc2626;}
.jc-note{grid-column:1/-1;background:#fffbeb;border:1px solid #fde68a;border-radius:8px;padding:8px 12px;font-size:12.5px;color:#78350f;white-space:pre-wrap;line-height:1.5;}
.jc-note .k{font-weight:700;margin-right:4px;}
.jc-finbox{grid-column:1/-1;border-top:1px dashed var(--line);padding-top:10px;}
.jc-sellrow{display:flex;align-items:center;gap:10px;margin-bottom:9px;flex-wrap:wrap;}
.jc-sellrow label{font-size:12px;font-weight:600;color:var(--mut);}
.jc-sellrow input{width:170px;padding:6px 9px;border:1px solid var(--line);border-radius:8px;font-size:13px;}
.jc-finsum{margin-top:9px;background:#f8fafc;border:1px solid var(--line);border-radius:8px;padding:7px 12px;display:flex;align-items:center;}
.jcard-body{border-top:1px solid var(--line);padding:12px 16px 14px;display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;}
.jc-sec{font-size:12px;font-weight:700;color:var(--mut);margin-bottom:6px;}
.ck-row{display:flex;align-items:center;gap:8px;padding:3px 0;font-size:13px;}
.ck-row.next{background:#eff6ff;border-radius:7px;padding:3px 6px;}
.ck-row.next .ck-lbl{color:#1e40af;font-weight:700;}
.ck-row.na .ck-lbl{color:var(--mut);text-decoration:line-through;}
.ck-dash{width:30px;text-align:center;color:var(--mut);flex:none;}
.ck-row .dot{flex:none;}
.ck-lbl{flex:1;min-width:120px;}
.ck-date{width:118px;}
.na-btn{font-size:10.5px;color:var(--mut);padding:2px 8px;}
.dot.na{border-style:dashed;color:var(--mut);background:var(--gray-l);}
@media (max-width:760px){.jc-actions{margin-left:0;width:100%;}.jc-id{min-width:140px;}.jcard-foot{padding-left:14px;}}
.btn:hover{background:var(--gray-l);}
.btn.primary{background:var(--brand);border-color:var(--brand);color:#fff;}
.btn.primary:hover{background:var(--brand-d);}
.btn.danger{background:var(--card);border-color:var(--red);color:var(--red);}
.btn.danger:hover{background:var(--red-l);}
.btn.sm{padding:5px 10px;font-size:12px;}
.btn.ghost{border-color:transparent;background:transparent;}
.btn.ghost:hover{background:var(--gray-l);}

/* Cards */
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:20px;}
.stat{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px 18px;}
.stat .lbl{font-size:12px;color:var(--mut);}
.stat .val{font-size:30px;font-weight:800;margin-top:3px;}
.stat .val small{font-size:13px;font-weight:600;color:var(--mut);}
.stat.b1{border-top:3px solid var(--brand);}
.stat.b2{border-top:3px solid var(--blue);}
.stat.b3{border-top:3px solid var(--done);}
.stat.b4{border-top:3px solid var(--amber);}

/* Filters */
.filters{display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end;background:var(--card);
  border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:16px;}
.fld{display:flex;flex-direction:column;gap:3px;}
.fld label{font-size:11px;color:var(--mut);font-weight:600;}
input,select,textarea{font-family:inherit;font-size:13px;border:1px solid var(--line);
  border-radius:7px;padding:7px 9px;background:#fff;color:var(--ink);}
input:focus,select:focus,textarea:focus{outline:2px solid var(--brand-l);border-color:var(--brand);}
input[type=date]{min-width:140px;}

/* Section / overview table */
.sec-title{font-size:14px;font-weight:700;margin:6px 0 10px;display:flex;align-items:center;gap:8px;}
.tbl-wrap{overflow:auto;border:1px solid var(--line);border-radius:12px;background:var(--card);}
table{border-collapse:separate;border-spacing:0;width:100%;}
th,td{padding:9px 11px;text-align:left;font-size:12.5px;border-bottom:1px solid var(--line);white-space:nowrap;}
th{background:#f8fafc;font-weight:700;color:#334155;position:sticky;top:0;z-index:2;font-size:11.5px;}
tbody tr:hover{background:#f8fafc;}
tbody tr:last-child td{border-bottom:none;}
.t-mut{color:var(--mut);}
.t-r{text-align:right;}
.neg-amt{color:var(--red);font-weight:700;}
.cat-row:hover{background:#fff7ed;}
.cat-row.open{background:#fff7ed;}
.cat-chev{display:inline-block;color:var(--brand-d);font-size:11px;transition:transform .15s;}
.cat-row.open .cat-chev{transform:rotate(90deg);}
.cat-detail td{background:#fafafa;}
table.cat-sub{width:100%;border-collapse:collapse;}
table.cat-sub th{background:#f1f5f9;color:#475569;font-weight:600;font-size:11px;padding:7px 10px;text-align:left;border-bottom:1px solid var(--line);}
table.cat-sub td{padding:7px 10px;font-size:12px;border-bottom:1px solid var(--line);background:#fff;}
table.cat-sub tr:last-child td{border-bottom:none;}
.costcat-row{display:flex;gap:8px;align-items:center;margin-bottom:6px;padding:6px 8px;background:#fafafa;border:1px solid #f1f5f9;border-radius:8px;}
.costcat-row input[type=text]{flex:1;padding:6px 10px;border:1px solid var(--line);border-radius:6px;font-size:13px;background:#fff;}
.costcat-row .btn.sm[disabled]{opacity:.35;cursor:not-allowed;}
.sec-title{margin-top:22px;}

/* Matrix table (job tabs) */
.mx th.grp{text-align:center;background:#eef2f6;border-left:2px solid var(--line);}
.mx th.grp.docs{background:#eff6ff;color:#1d4ed8;}
.mx th.grp.steps{background:#f0fdfa;color:var(--brand-d);}
.mx .sticky-l{position:sticky;left:0;background:var(--card);z-index:3;border-right:2px solid var(--line);min-width:150px;}
.mx th.sticky-l{z-index:5;background:#f8fafc;}
.mx tbody tr:hover .sticky-l{background:#f8fafc;}
.mx .sc{text-align:center;padding:5px 6px;min-width:114px;border-left:1px solid #eef2f6;}
.mx td.firstdoc,.mx th.firstdoc{border-left:2px solid #dbeafe;}
.mx td.firststep,.mx th.firststep{border-left:2px solid #ccfbf1;}

/* Toggle dot */
.dot{width:30px;height:30px;border-radius:50%;border:2px solid var(--gray);background:var(--gray-l);
  cursor:pointer;font-size:15px;color:#fff;display:inline-flex;align-items:center;justify-content:center;
  transition:.12s;font-weight:700;}
.dot:hover{transform:scale(1.08);}
.dot.done{background:var(--done);border-color:var(--done);box-shadow:0 1px 4px rgba(22,163,74,.4);}
.cd{margin-top:3px;width:108px;font-size:10.5px;padding:3px 4px;color:var(--mut);}
.cd.has{color:var(--ink);border-color:#bbf7d0;}

/* progress bar */
.pbar{width:100%;height:7px;background:var(--gray-l);border-radius:6px;overflow:hidden;}
.pbar i{display:block;height:100%;background:var(--brand);border-radius:6px;}
.pwrap{display:flex;align-items:center;gap:7px;}
.pwrap span{font-size:11px;color:var(--mut);font-weight:600;min-width:34px;}

/* badges */
.badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;
  padding:3px 9px;border-radius:20px;}
.bg-paid{background:var(--done-l);color:#15803d;}
.bg-unpaid{background:var(--amber-l);color:#b45309;}
.bg-closed{background:var(--brand-l);color:var(--brand-d);}
.bg-prog{background:#e0e7ff;color:#4338ca;}
.bg-type{background:#f1f5f9;color:#475569;}
.chip-ok{color:var(--done);font-weight:700;}
.chip-no{color:var(--red);font-weight:700;}
.chip-na{color:var(--mut);}

/* Form */
.form-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;}
.form-grid .f.wide{grid-column:1/-1;}
.form-card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:18px 20px;margin-bottom:18px;}
.form-card h3{font-size:14px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px;
  padding-bottom:10px;border-bottom:1px solid var(--line);}
.f{display:flex;flex-direction:column;gap:4px;}
.f label{font-size:12px;color:#334155;font-weight:600;}
.f label .req{color:var(--red);}
.f input,.f select,.f textarea{width:100%;}
.be{font-size:11px;color:var(--brand-d);font-weight:600;margin-top:2px;min-height:14px;}
.radio-row{display:flex;gap:10px;flex-wrap:wrap;}
.radio-row label{display:inline-flex;align-items:center;justify-content:center;gap:8px;
  border:1px solid var(--line);padding:10px 16px;border-radius:8px;cursor:pointer;
  font-weight:600;font-size:13px;white-space:nowrap;flex:1 1 160px;}
.radio-row label.on{border-color:var(--brand);background:var(--brand-l);color:var(--brand-d);}
.radio-row input{accent-color:var(--brand);flex:none;width:16px;height:16px;margin:0;}

/* vaccine */
.vax-group{border:1px solid var(--line);border-radius:10px;padding:13px 14px;margin-bottom:12px;background:#fcfdfd;}
.vax-group > .vh{display:flex;align-items:center;gap:8px;margin-bottom:9px;}
.vax-group > .vh b{font-size:13px;}
.vax-row{display:grid;grid-template-columns:74px 1fr 1fr 150px 30px;gap:9px;align-items:start;
  padding:8px 0;border-top:1px dashed var(--line);}
.vax-row:first-of-type{border-top:none;}
.vax-row .pin{font-size:12px;font-weight:700;color:var(--brand-d);padding-top:8px;}
.vax-row .vfld label{font-size:10.5px;color:var(--mut);font-weight:600;}
.vax-row .vfld input{width:100%;}
.vax-row .vst{padding-top:7px;font-size:18px;text-align:center;}
.vax-rm{border:none;background:none;color:var(--red);cursor:pointer;font-size:16px;padding-top:7px;}
.vax-result{border-radius:10px;padding:12px 14px;margin-top:6px;font-size:12.5px;}
.vax-result.ok{background:var(--done-l);border:1px solid #bbf7d0;}
.vax-result.no{background:var(--red-l);border:1px solid #fecaca;}
.vax-result.na{background:var(--gray-l);border:1px solid var(--line);}
.vax-result ul{margin:6px 0 0 4px;list-style:none;}
.vax-result li{padding:3px 0;display:flex;gap:7px;align-items:flex-start;}
.cost-row{display:grid;grid-template-columns:1fr 170px 30px;gap:9px 9px;margin-bottom:11px;align-items:center;padding:8px;background:#fafafa;border:1px solid #f1f5f9;border-radius:8px;}
.cost-row .cost-note{grid-column:1 / -1;font-size:12px;padding:6px 10px;background:#fff;border:1px solid var(--line);border-radius:6px;}
.cost-adv{grid-column:1 / -1;display:flex;align-items:center;gap:6px;font-size:11.5px;color:#475569;cursor:pointer;user-select:none;}
.cost-adv input{accent-color:#0d9488;}
.cost-adv.on{color:#0f766e;font-weight:600;}
.cost-rm{border:none;background:none;color:var(--red);cursor:pointer;font-size:15px;}
.combo{position:relative;}
.combo input[type=text]{padding-right:34px;}
.combo-caret{position:absolute;right:4px;top:50%;transform:translateY(-50%);border:none;background:transparent;cursor:pointer;font-size:11px;color:#64748b;padding:8px 10px;line-height:1;}
.combo-caret:hover{color:var(--brand-d);}
.combo-panel{display:none;position:absolute;top:calc(100% + 3px);left:0;right:0;max-height:260px;overflow:auto;background:#fff;border:1px solid var(--line);border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.10);z-index:100;}
.combo-panel.open{display:block;}
.combo-item{padding:8px 12px;cursor:pointer;font-size:13px;border-bottom:1px solid #f1f5f9;color:#1e293b;}
.combo-item:last-child{border-bottom:none;}
.combo-item:hover,.combo-item.hi{background:#fff7ed;color:var(--brand-d);}
.combo-item.new-entry{font-style:italic;color:var(--brand-d);background:#fffbeb;}
.combo-empty{padding:8px 12px;color:var(--mut);font-size:12px;font-style:italic;}
.fin-sum{display:flex;flex-wrap:wrap;gap:10px;}
.fin-sum>div{flex:1 1 160px;background:var(--gray-l);border-radius:9px;padding:10px 14px;
  display:flex;flex-direction:column;gap:2px;}
.fin-sum>div span{font-size:11px;color:var(--mut);}
.fin-sum>div b{font-size:18px;}
.fin-profit{background:var(--done-l)!important;}
.fin-profit b{color:#15803d;}
.fin-profit.neg{background:var(--red-l)!important;}
.fin-profit.neg b{color:var(--red);}

.hint{background:#fffbeb;border:1px solid #fde68a;border-radius:8px;padding:9px 12px;
  font-size:12px;color:#92400e;margin-bottom:12px;}
.empty{text-align:center;padding:50px 20px;color:var(--mut);}
.empty .big{font-size:40px;margin-bottom:8px;}

/* toast */
#toast{position:fixed;bottom:22px;right:22px;z-index:200;display:flex;flex-direction:column;gap:8px;}
.toast{background:#0f172a;color:#fff;padding:11px 16px;border-radius:9px;font-size:13px;
  box-shadow:0 8px 24px rgba(0,0,0,.25);animation:slidein .2s;max-width:340px;}
.toast.ok{background:var(--brand-d);}
.toast.err{background:var(--red);}
@keyframes slidein{from{transform:translateX(40px);opacity:0;}}

/* settings */
.set-row{display:flex;gap:12px;flex-wrap:wrap;align-items:center;padding:11px 0;border-bottom:1px solid var(--line);}
.set-row:last-child{border-bottom:none;}
pre{background:#0f172a;color:#e2e8f0;padding:14px;border-radius:9px;font-size:11.5px;
  overflow:auto;line-height:1.55;}
code{background:var(--gray-l);padding:1px 6px;border-radius:4px;font-size:12px;}
.pill{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;}
.pill.on{background:var(--done-l);color:#15803d;}
.pill.off{background:var(--gray-l);color:var(--mut);}
a{color:var(--brand-d);}
.mini{font-size:11.5px;color:var(--mut);}
.row-actions{display:flex;gap:4px;}
/* ---- Calendar tab ---- */
.cal-head{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap;}
.cal-title{font-size:17px;font-weight:700;min-width:150px;text-align:center;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px;}
.cal-dow{text-align:center;font-size:11px;font-weight:700;color:#64748b;padding:4px 0;}
.cal-cell{min-height:86px;border:1px solid var(--line);border-radius:8px;padding:4px 5px;background:#fff;cursor:pointer;transition:.12s;overflow:hidden;}
.cal-cell:hover{background:#fff7ed;}
.cal-cell.blank{background:#f8fafc;border-style:dashed;cursor:default;}
.cal-cell.blank:hover{background:#f8fafc;}
.cal-cell.today{border:2px solid var(--brand);}
.cal-cell.sel{background:#fff7ed;box-shadow:inset 0 0 0 2px var(--brand);}
.cal-num{font-size:11.5px;font-weight:700;color:#475569;margin-bottom:3px;}
.cal-cell.today .cal-num{color:var(--brand-d);}
.cal-ev{font-size:10.5px;border-radius:5px;padding:1px 5px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#fff;}
.ev-travel{background:var(--brand);}
.ev-done{background:#94a3b8;}
.ev-blood{background:#dc2626;}
.ev-vax{background:#7c3aed;}
.cal-more{font-size:10px;color:#64748b;}
.cal-day-panel{margin-top:14px;}
.cal-legend{display:flex;gap:14px;flex-wrap:wrap;font-size:11.5px;color:#475569;margin:10px 2px 0;}
.cal-legend .dot{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:4px;vertical-align:-1px;}
.cal-dots{display:none;}
@media(max-width:760px){.cal-cell{min-height:52px;padding:3px;}.cal-ev,.cal-more{display:none;}.cal-dots{display:flex;gap:3px;flex-wrap:wrap;}.cal-dots span{width:8px;height:8px;border-radius:50%;}}

function jobMonthMaxNo(dateStr){

  return jobType?("CV-"+jobTypeCode(jobType)+"-"+key+"-"+nn):("CV-"+key+"-"+nn);

/* ------- Cloud (Supabase / Postgres SQL) ------- */
function cloudHeaders(){return{apikey:DB.cloud.key,Authorization:"Bearer "+DB.cloud.key,"Content-Type":"application/json"};}
function cloudBase(){
  let u=(DB.cloud.url||"").trim().replace(/\/+$/,"").replace(/\/rest\/v1.*$/i,"");
  return u+"/rest/v1/dashboard_jobs";
}
function cloudErr(e){
  let m=(e&&e.message)||String(e);
  if(typeof location!=="undefined"&&location.protocol==="file:")
    m+=" — สาเหตุน่าจะเป็นเพราะเปิดไฟล์แบบ file:// เบราว์เซอร์บล็อกการเชื่อมต่อ Cloud • วิธีแก้: เปิดผ่าน Google Chrome หรือ host ไฟล์ขึ้นเว็บก่อน";
  return m;
}
async function cloudUpsert(job){
  try{const r=await fetch(cloudBase(),{method:"POST",headers:Object.assign(cloudHeaders(),{Prefer:"resolution=merge-duplicates,return=minimal"}),
    body:JSON.stringify([{id:job.id,data:job,updated_at:job.updatedAt}])});
    if(!r.ok)throw new Error("HTTP "+r.status);
    syncOK(job.id);return true;}
  catch(e){console.warn("cloud upsert fail",e);syncFail(job.id);return false;}
}
/* ------- Sync queue: งานที่ส่งขึ้น Cloud ไม่สำเร็จ จะถูกจำไว้และลองใหม่ ------- */
function syncFail(id){
  DB.pendingSync=DB.pendingSync||[];
  if(!DB.pendingSync.includes(id)){DB.pendingSync.push(id);saveLocal();
    toast("⚠️ ส่งงานขึ้น Cloud ไม่สำเร็จ — เก็บไว้ลองใหม่อัตโนมัติ","err");}
  paintSyncBadge();
}
function syncOK(id){
  if(DB.pendingSync&&DB.pendingSync.includes(id)){DB.pendingSync=DB.pendingSync.filter(x=>x!==id);saveLocal();}
  paintSyncBadge();
}
async function retryPendingSync(){
  if(!DB.cloud.enabled||!DB.pendingSync||!DB.pendingSync.length)return;
  for(const id of [...DB.pendingSync]){
    const j=getJob(id)||getLead(id);
    if(j){await cloudUpsert(j);continue;}
    // งานไม่อยู่แล้ว = ถูกลบ → ต้องส่ง tombstone ขึ้น cloud ให้สำเร็จ (ไม่งั้นงานจะฟื้นจากเครื่องอื่น)
    if(DB.tombstones&&DB.tombstones[id]){await cloudSoftDelete(id,null,DB.tombstones[id]);continue;}
    syncOK(id);
  }
}
function paintSyncBadge(){
  const el=document.getElementById("syncBadge");if(!el)return;
  const n=(DB.pendingSync||[]).length;
  el.style.display=n?"inline-flex":"none";
  el.textContent="⏳ "+n+" งานยังไม่ขึ้น Cloud — คลิกเพื่อส่งใหม่";
}
/* ------- Running number กลางจาก Supabase (atomic — กันเลขซ้ำข้ามเครื่อง) -------
   counter ใช้ key "รายเดือน" (CV-2026-06-) ร่วมกันทุกประเภท → เลขรันต่อเนื่องไม่รีเซ็ต
   รหัสประเภท (EP/VX/...) เป็นแค่ส่วนแสดงผลข้างหน้า ไม่แยก counter */
function jobNoCounterPrefix(dateStr){return "CV-"+jobMonthKey(dateStr)+"-";}
async function cloudNextJobNo(dateStr,jobType){
  const counterPrefix=jobNoCounterPrefix(dateStr);       // เดือนอย่างเดียว → counter ร่วม
  const floor=jobMonthMaxNo(dateStr);                    // กัน counter ตกหลังข้อมูลจริง (นับทั้งเลขเก่า+ใหม่ในเดือน)
  const base=(DB.cloud.url||"").trim().replace(/\/+$/,"").replace(/\/rest\/v1.*$/i,"");
  const r=await fetch(base+"/rest/v1/rpc/next_job_no",{method:"POST",headers:cloudHeaders(),
    body:JSON.stringify({p_prefix:counterPrefix,p_floor:floor})});
  if(!r.ok)throw new Error("RPC HTTP "+r.status);
  const v=await r.json();
  return composeJobNo(dateStr,jobType,v);                // ประกอบ CV-EP-2026-06-054
}
function tmpJobNo(){return "CV-TMP-"+Date.now().toString(36).slice(-6).toUpperCase();}
async function issueJobNo(dateStr,jobType){
  if(!DB.cloud.enabled)return nextJobNo(dateStr,jobType);  // ไม่ใช้ cloud → เลข local (เครื่องเดียว)
  try{return await cloudNextJobNo(dateStr,jobType);}       // ชั้น 1: เลขกลาง atomic
  catch(e){
    try{const ok=await cloudPull(true);                    // ชั้น 2: ดึงข้อมูลล่าสุดก่อน แล้วออกเลข local
      if(ok)return nextJobNo(dateStr,jobType);}catch(_){}
    return tmpJobNo();                                     // ชั้น 2b: ออฟไลน์ → เลขชั่วคราว
  }
}
async function resolveTmpNos(){
  if(!DB.cloud.enabled)return;
  const tmps=DB.jobs.filter(j=>/^CV-TMP-/.test(j.jobNo||""));
  let fixed=0;
  for(const j of tmps){
    try{const no=await cloudNextJobNo(j.recordDate||((j.createdAt||"").slice(0,10)),j.jobType);
      j.jobNo=no;j.updatedAt=new Date().toISOString();saveLocal();cloudUpsert(j);fixed++;}
    catch(e){}
  }
  if(fixed){toast("ออกเลขจริงแทนเลขชั่วคราวแล้ว "+fixed+" งาน ✓","ok");render();}
}
/* ------- Watchdog: ตรวจจับเลขที่งานซ้ำ ------- */
function findDupJobNos(){
  const m={};
  DB.jobs.forEach(j=>{const no=(j.jobNo||"").trim();if(!no||/^CV-TMP-/.test(no))return;(m[no]=m[no]||[]).push(j);});
  return Object.entries(m).filter(([k,v])=>v.length>1);
}
async function fixDupJobNos(){
  const dups=findDupJobNos();let fixed=0;
  for(const [no,v] of dups){
    v.sort((a,b)=>(a.createdAt||"").localeCompare(b.createdAt||""));
    for(const j of v.slice(1)){   // งานที่สร้างก่อนคงเลขเดิม งานหลังได้เลขใหม่
      j.jobNo=await issueJobNo(j.recordDate||((j.createdAt||"").slice(0,10)),j.jobType);
      j.updatedAt=new Date().toISOString();saveLocal();cloudUpsert(j);fixed++;
    }
  }
  toast("แก้เลขซ้ำแล้ว "+fixed+" งาน ✓","ok");render();
}
/* soft-delete: เขียน tombstone (data._deleted=true) ทับ row เดิม — ไม่ลบ row ทิ้ง
   เพื่อให้เครื่องอื่น pull เจอแล้วลบงานนั้นตามไปด้วย (กันงานฟื้น) */
async function cloudSoftDelete(id,job,ts){
  const data=Object.assign({},job||{id:id},{_deleted:true,_deletedAt:ts,updatedAt:ts});
  try{const r=await fetch(cloudBase(),{method:"POST",keepalive:true,headers:Object.assign(cloudHeaders(),{Prefer:"resolution=merge-duplicates,return=minimal"}),
    body:JSON.stringify([{id:id,data:data,updated_at:ts}])});
    if(!r.ok)throw new Error("HTTP "+r.status);
    syncOK(id);return true;}
  catch(e){console.warn("cloud soft-delete fail",e);syncFail(id);return false;}
}
async function cloudPull(silent){
  try{const r=await fetch(cloudBase()+"?select=id,data,updated_at",{headers:cloudHeaders()});
    if(!r.ok)throw new Error("HTTP "+r.status);
    const rows=await r.json();let added=0,updated=0,removed=0;
    DB.tombstones=DB.tombstones||{};
    rows.forEach(row=>{const j=row.data;if(!j||!j.id)return;
      const rTs=row.updated_at||"";
      // ---- lead rows (อยู่ตารางเดียวกัน แยกด้วย _type:"lead") ----
      if(j._type==="lead"||/^lead-/.test(j.id)){
        DB.leads=DB.leads||[];
        if(j._deleted){
          const exL=getLead(j.id);
          if(exL&&(exL.updatedAt||"")<=rTs){DB.leads=DB.leads.filter(x=>x.id!==j.id);removed++;}
          if(!exL||(exL.updatedAt||"")<=rTs)DB.tombstones[j.id]=rTs;
          return;
        }
        const exL=getLead(j.id);
        if(!exL){
          if(DB.tombstones[j.id]&&DB.tombstones[j.id]>=rTs)return;
          DB.leads.push(j);added++;
        }
        else if(rTs>(exL.updatedAt||"")){const i=DB.leads.findIndex(x=>x.id===j.id);DB.leads[i]=j;updated++;}
        return;
      }
      // ---- tombstone จาก cloud: งานถูกลบจากเครื่องอื่น ----
      if(j._deleted){
        const ex=getJob(j.id);
        // ลบ local เฉพาะเมื่อ local ไม่ได้ถูกแก้ใหม่กว่าเวลาที่ลบ (ถ้าแก้ใหม่กว่า = ตั้งใจกู้คืน เก็บไว้)
        if(ex&&(ex.updatedAt||"")<=rTs){DB.jobs=DB.jobs.filter(x=>x.id!==j.id);removed++;}
        if(!ex||(ex.updatedAt||"")<=rTs)DB.tombstones[j.id]=rTs;
        return;
      }
      migrateJobPets(j);
      const ex=getJob(j.id);
      if(!ex){
        // กันงานฟื้น: ถ้าเรามี tombstone ที่ใหม่กว่า/เท่ากับ row นี้ → ไม่ดึงกลับ
        if(DB.tombstones[j.id]&&DB.tombstones[j.id]>=rTs)return;
        DB.jobs.push(j);added++;
      }
      else if(rTs>(ex.updatedAt||"")){const i=DB.jobs.findIndex(x=>x.id===j.id);DB.jobs[i]=j;updated++;}});
    saveLocal();
    if(!silent)toast("ดึงข้อมูลจาก Cloud สำเร็จ — เพิ่ม "+added+" / อัปเดต "+updated+(removed?(" / ลบตามเครื่องอื่น "+removed):""),"ok");
    return true;
  }catch(e){if(!silent)toast("ดึงข้อมูล Cloud ไม่สำเร็จ: "+cloudErr(e),"err");return false;}
}
async function cloudPush(){
  try{const body=DB.jobs.map(j=>({id:j.id,data:j,updated_at:j.updatedAt||new Date().toISOString()}));
    (DB.leads||[]).forEach(l=>{body.push({id:l.id,data:l,updated_at:l.updatedAt||new Date().toISOString()});});
    // push tombstone ของงาน/lead ที่ลบไปแล้วด้วย เพื่อให้เครื่องอื่นลบตาม (กันงานฟื้น)
    Object.entries(DB.tombstones||{}).forEach(([id,ts])=>{
      if(!getJob(id)&&!getLead(id))body.push({id:id,data:{id:id,_deleted:true,_deletedAt:ts,updatedAt:ts},updated_at:ts});
    });
    const r=await fetch(cloudBase(),{method:"POST",headers:Object.assign(cloudHeaders(),{Prefer:"resolution=merge-duplicates,return=minimal"}),
      body:JSON.stringify(body)});
    if(!r.ok)throw new Error("HTTP "+r.status);
    toast("ส่งข้อมูลขึ้น Cloud สำเร็จ ("+DB.jobs.length+" งาน)","ok");return true;
  }catch(e){toast("ส่งข้อมูลขึ้น Cloud ไม่สำเร็จ: "+cloudErr(e),"err");return false;}
}

/* ============================ GOOGLE DRIVE ============================ */
function driveReady(){return !!(DB.drive&&DB.drive.enabled&&DB.drive.clientId);}
function ensureDriveToken(){
  return new Promise((resolve,reject)=>{
    if(driveToken&&Date.now()<driveTokenExp-60000){resolve(driveToken);return;}
    if(typeof google==="undefined"||!google.accounts||!google.accounts.oauth2){
      reject(new Error("โหลดไลบรารี Google ไม่สำเร็จ — ตรวจอินเทอร์เน็ตแล้วลองใหม่"));return;}
    try{
      const tc=google.accounts.oauth2.initTokenClient({
        client_id:DB.drive.clientId,
        scope:"https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/calendar.events https://www.googleapis.com/auth/userinfo.email",
        callback:(resp)=>{
          if(resp&&resp.access_token){driveToken=resp.access_token;
            driveTokenExp=Date.now()+((resp.expires_in||3600)*1000);
            rememberGoogleHint();resolve(driveToken);}
          else reject(new Error("ขอสิทธิ์ Google Drive ไม่สำเร็จ"));
        },
        error_callback:(e)=>reject(new Error("เชื่อมต่อ Google ไม่สำเร็จ"+(e&&e.type?(" ("+e.type+")"):"")))
      });
      // มี email ที่เคย login → ข้ามหน้าเลือก account
      tc.requestAccessToken(DB.drive.loginHint?{hint:DB.drive.loginHint,prompt:""}:{});
    }catch(e){reject(e);}
  });
}
function rememberGoogleHint(){
  // จำ email ที่ login ไว้ ครั้งต่อไปจะได้ไม่เด้งหน้าเลือก account
  if(DB.drive.loginHint||!driveToken)return;
  fetch("https://www.googleapis.com/oauth2/v3/userinfo",{headers:{Authorization:"Bearer "+driveToken}})
    .then(r=>r.ok?r.json():null)
    .then(u=>{if(u&&u.email){DB.drive.loginHint=u.email;saveLocal();}})
    .catch(()=>{});
}
async function ensureDriveFolder(token){
  if(DB.drive.folderId)return DB.drive.folderId;
  const r=await fetch("https://www.googleapis.com/drive/v3/files?fields=id",{
    method:"POST",headers:{Authorization:"Bearer "+token,"Content-Type":"application/json"},
    body:JSON.stringify({name:"Convey Pet Relocation - เอกสารงาน",mimeType:"application/vnd.google-apps.folder"})});
  if(!r.ok)throw new Error("สร้างโฟลเดอร์ Drive ไม่สำเร็จ (HTTP "+r.status+")");
  const d=await r.json();
  DB.drive.folderId=d.id;saveLocal();
  return d.id;
}
async function driveUpload(file,filename){
  const token=await ensureDriveToken();
  const folderId=await ensureDriveFolder(token);
  const meta={name:filename,parents:[folderId]};
  const fd=new FormData();
  fd.append("metadata",new Blob([JSON.stringify(meta)],{type:"application/json"}));
  fd.append("file",file);
  const r=await fetch("https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,name,webViewLink",{
    method:"POST",headers:{Authorization:"Bearer "+token},body:fd});
  if(!r.ok)throw new Error("อัปโหลดไม่สำเร็จ (HTTP "+r.status+")");
  return await r.json();
}
function attachFilenameBase(){
  syncCountryFromDOM("origin");syncCountryFromDOM("dest");
  const cn=$("#f-cname")?$("#f-cname").value.trim():"";
  const jt=$("#f-jtype")?((JOB_TYPES[$("#f-jtype").value]||{}).label||""):"";
  const org=resolveCountry("origin").split(" (")[0].trim();
  const dst=resolveCountry("dest").split(" (")[0].trim();
  const rd=$("#f-record")?$("#f-record").value:"";
  function clean(s){return String(s||"").replace(/[\/\\:*?"<>|\n\r]+/g,"-").trim();}
  const base=[cn,jt,org,dst,rd].map(clean).filter(x=>x).join("_");
  return base||"เอกสารงาน";
}
async function handleAttachUpload(files){
  files=files?Array.from(files):[];
  if(!files.length)return;
  if(!$("#f-cname")||!$("#f-cname").value.trim()){toast("กรุณากรอกชื่อลูกค้าก่อนอัปโหลดไฟล์","err");return;}
  if(!(driveToken&&Date.now()<driveTokenExp-60000)){
    toast("เซสชัน Google หมดอายุ — กดปุ่ม 'เชื่อมต่อ Google Drive' อีกครั้งก่อนอัปโหลด","err");paintAttachments();return;}
  let ok=0,fail=0;
  toast("กำลังอัปโหลด "+files.length+" ไฟล์ขึ้น Google Drive...");
  for(const file of files){
    const extM=(file.name||"").match(/\.[A-Za-z0-9]+$/);
    const n=formAttachments.length;
    const fname=attachFilenameBase()+(n>0?("_"+(n+1)):"")+(extM?extM[0]:"");
    try{
      const res=await driveUpload(file,fname);
      formAttachments.push({fileId:res.id,name:res.name||fname,
        link:res.webViewLink||("https://drive.google.com/file/d/"+res.id+"/view"),
        addedAt:new Date().toISOString()});
      ok++;paintAttachments();
    }catch(e){fail++;console.warn("upload fail",file.name,e);}
  }
  toast(fail?("อัปโหลดสำเร็จ "+ok+" ไฟล์ • ไม่สำเร็จ "+fail+" ไฟล์ — ลองอัปโหลดไฟล์ที่เหลือใหม่"):("อัปโหลดสำเร็จ "+ok+" ไฟล์ ✓"),fail?"err":"ok");
}

/* หัวเรื่อง event: ประเภทงาน - ต้นทาง→ปลายทาง - ลูกค้า - ชื่อสัตว์เลี้ยง */
function calEventTitle(job,prefix){
  const t=JOB_TYPES[job.jobType]||{label:job.jobType||"-"};
  const base=(t.label||"-")+" - "+(job.originCountry||"?")+"→"+(job.destCountry||"?")+" - "+(job.customerName||"-")+" - "+petsShort(job);
  return prefix?("🔔 "+prefix+" | "+base):("🐾 "+base);
}
function calEventDesc(job){
  const dashLink=location.origin+location.pathname+"#job="+encodeURIComponent(job.id);
  let d="📋 เลขที่งาน: "+(job.jobNo||"-")+
    "\nลูกค้า: "+(job.customerName||"-")+
    "\n📞 เบอร์โทร: "+(job.customerPhone||"-")+
    "\nสัตว์เลี้ยง: "+petsShort(job)+
    "\nเส้นทาง: "+(job.originCountry||"?")+" → "+(job.destCountry||"?")+
    "\nวันเดินทาง: "+(job.travelDate||"-")+
    "\nผู้รับผิดชอบ: "+(job.assignee||"-");
  if((job.notes||"").trim())d+="\n\n📝 หมายเหตุเพิ่มเติม:\n"+job.notes.trim();
  const att=job.attachments||[];
  if(att.length){
    d+="\n\n📎 ไฟล์แนบ ("+att.length+"):";
    att.forEach(a=>{d+="\n• "+(a.name||"ไฟล์")+"\n  "+(a.link||"");});
  }
  d+="\n\n🔗 เปิดงานนี้ใน Dashboard:\n"+dashLink+
     "\n\n— สร้างจาก Convey Dashboard";
  return d;
}
async function createCalendarEvent(job,attendees){
  attendees=Array.isArray(attendees)?attendees.filter(x=>x):[];
  const token=await ensureDriveToken();
  if(!job.travelDate)throw new Error("งานนี้ยังไม่มีวันเดินทาง — กรอกวันเดินทางก่อน");
  const event={summary:calEventTitle(job),description:calEventDesc(job),
    start:{date:job.travelDate},end:{date:job.travelDate},
    reminders:{useDefault:false,overrides:[{method:"popup",minutes:4320},{method:"popup",minutes:1440},{method:"email",minutes:1440}]}};
  if(attendees.length)event.attendees=attendees.map(e=>({email:e}));
  const url="https://www.googleapis.com/calendar/v3/calendars/primary/events"+(attendees.length?"?sendUpdates=all":"");
  const r=await fetch(url,{method:"POST",headers:{Authorization:"Bearer "+token,"Content-Type":"application/json"},body:JSON.stringify(event)});
  if(!r.ok)throw new Error("สร้าง event ไม่สำเร็จ (HTTP "+r.status+") — ตรวจว่าเปิด Calendar API ใน Google Cloud แล้ว");
  return await r.json();
}
async function createReminderEvent(job,label,date,attendees,time){
  attendees=Array.isArray(attendees)?attendees.filter(x=>x):[];
  const token=await ensureDriveToken();
  let startEnd,overrides;
  if(time){
    // มีเวลา → นัดเวลานั้น ยาว 1 ชม. เตือน 1 วันก่อน + 1 ชม.ก่อน
    function fmtLocal(x){return x.getFullYear()+"-"+String(x.getMonth()+1).padStart(2,"0")+"-"+String(x.getDate()).padStart(2,"0")+"T"+String(x.getHours()).padStart(2,"0")+":"+String(x.getMinutes()).padStart(2,"0")+":00";}
    const s=new Date(date+"T"+time+":00");
    const e=new Date(s.getTime()+3600000);
    startEnd={start:{dateTime:fmtLocal(s),timeZone:"Asia/Bangkok"},end:{dateTime:fmtLocal(e),timeZone:"Asia/Bangkok"}};
    overrides=[{method:"popup",minutes:1440},{method:"email",minutes:1440},{method:"popup",minutes:60}];
  }else{
    startEnd={start:{date:date},end:{date:date}};
    overrides=[{method:"popup",minutes:1440},{method:"email",minutes:1440}];
  }
  const event=Object.assign({summary:calEventTitle(job,label),description:calEventDesc(job),
    reminders:{useDefault:false,overrides:overrides}},startEnd);
  if(attendees.length)event.attendees=attendees.map(e=>({email:e}));
  const url="https://www.googleapis.com/calendar/v3/calendars/primary/events"+(attendees.length?"?sendUpdates=all":"");
  const r=await fetch(url,{method:"POST",headers:{Authorization:"Bearer "+token,"Content-Type":"application/json"},body:JSON.stringify(event)});
  if(!r.ok)throw new Error("สร้าง event ไม่สำเร็จ (HTTP "+r.status+")");
  return await r.json();
}

/* ============================ VACCINE VALIDATION ============================ */
function ageDaysAt(dob,d){const D=parseD(d),B=parseD(dob);if(!D||!B)return null;return daysBetween(D,B);}
function validatePet(pet,dir,cond,travelDate){
  pet=pet||{};dir=dir||"";cond=cond||"china";
  const dob=pet.dob;const imp=parseD(travelDate);
  const vax=pet.vax||{combined:[],lepto:[],rabies:[]};
  const res={rows:{combined:[],lepto:[],rabies:[]},micro:null,blood:null,extra:[]};

  ["combined","lepto"].forEach(grp=>{
    (vax[grp]||[]).forEach(v=>{
      if(!v.date){res.rows[grp].push({ok:null,msg:"ยังไม่ระบุวันที่ฉีด"});return;}
      if(dir!=="import"){res.rows[grp].push({ok:null,msg:"บันทึกแล้ว (เงื่อนไขตรวจเฉพาะงาน Import)"});return;}
      const a=ageDaysAt(dob,v.date);const exp=parseD(v.expiry);const probs=[];const okm=[];
      if(a===null)probs.push("ต้องระบุวันเกิดสัตว์เลี้ยง");
      else if(a<60)probs.push("ฉีดตอนอายุ "+a+" วัน — ต้อง ≥ 60 วัน (2 เดือน)");
      else okm.push("ฉีดตอนอายุ "+a+" วัน");
      if(exp&&imp){if(exp<imp)probs.push("วัคซีนหมดอายุก่อนวันนำเข้าไทย");else okm.push("ยังไม่หมดอายุ ณ วันนำเข้า");}
      else if(!exp)okm.push("ยังไม่ได้กรอกวันหมดอายุ");
      res.rows[grp].push({ok:probs.length?false:(a!==null?true:null),msg:(probs.concat(okm)).join(" • ")});
    });
  });

  const rb=vax.rabies||[];
  rb.forEach((v,i)=>{
    if(!v.date){res.rows.rabies.push({ok:null,msg:"ยังไม่ระบุวันที่ฉีด"});return;}
    const a=ageDaysAt(dob,v.date);const probs=[];const okm=[];
    if(dir==="import"){
      const exp=parseD(v.expiry);
      if(a===null)probs.push("ต้องระบุวันเกิดสัตว์เลี้ยง");
      else if(a<85)probs.push("ฉีดตอนอายุ "+a+" วัน — ต้อง ≥ 85 วัน (3 เดือน)");
      else okm.push("ฉีดตอนอายุ "+a+" วัน");
      if(exp&&imp){if(exp<imp)probs.push("วัคซีนหมดอายุก่อนวันนำเข้าไทย");else okm.push("ยังไม่หมดอายุ ณ วันนำเข้า");}
      else if(!exp)okm.push("ยังไม่ได้กรอกวันหมดอายุ");
    }else if(dir==="export"){
      if(cond==="general"){res.rows.rabies.push({ok:null,msg:"บันทึกแล้ว (ปลายทางทั่วไป — ไม่ตรวจเงื่อนไข)"});return;}
      if(i===0){
        if(a===null)probs.push("ต้องระบุวันเกิดสัตว์เลี้ยง");
        else if(a<85)probs.push("เข็มแรกฉีดตอนอายุ "+a+" วัน — ต้อง ≥ 85 วัน (3 เดือน)");
        else okm.push("เข็มแรก • อายุ "+a+" วัน");
      }else{
        const prev=parseD(rb[i-1].date);
        if(prev){const gap=daysBetween(parseD(v.date),prev);
          if(cond==="china"&&gap<30)probs.push("ห่างจากเข็มก่อนหน้า "+gap+" วัน — จีนต้อง ≥ 30 วัน");
          else okm.push("ห่างจากเข็มก่อนหน้า "+gap+" วัน");
        }else probs.push("เข็มก่อนหน้ายังไม่ระบุวันที่");
      }
    }else{res.rows.rabies.push({ok:null,msg:"เลือกทิศทางงาน (Import/Export) ก่อน"});return;}
    res.rows.rabies.push({ok:probs.length?false:(a!==null||i>0?true:null),msg:(probs.concat(okm)).join(" • ")});
  });

  if(dir==="export"){
    if(cond==="general"){
      res.micro=pet.microchipDate?{ok:null,msg:"บันทึกแล้ว (ไม่ตรวจเงื่อนไข)"}:{ok:null,msg:"ยังไม่ระบุวันที่ฝังไมโครชิพ"};
      res.blood=pet.bloodDate?{ok:null,msg:"บันทึกแล้ว (ไม่ตรวจเงื่อนไข)"}:{ok:null,msg:"ยังไม่ระบุวันที่เจาะเลือด"};
    }else{
      const mc=parseD(pet.microchipDate);const r0=parseD(rb[0]&&rb[0].date);
      if(!mc)res.micro={ok:null,msg:"ยังไม่ระบุวันที่ฝังไมโครชิพ"};
      else if(!r0)res.micro={ok:null,msg:"ยังไม่ระบุวัคซีนพิษสุนัขบ้าเข็มแรก"};
      else if(cond==="china"){const ok=daysBetween(mc,r0)<=0;
        res.micro={ok,msg:ok?"ฝังก่อน/วันเดียวกับวัคซีนพิษสุนัขบ้าเข็มแรก ✓":"จีน: ไมโครชิพต้องฝังก่อนหรือวันเดียวกับวัคซีนพิษสุนัขบ้าเข็มแรก"};}
      else{const ok=daysBetween(mc,r0)>=0;
        res.micro={ok,msg:ok?"ฝังหลัง/วันเดียวกับวัคซีนพิษสุนัขบ้าเข็มแรก ✓":"EU: ไมโครชิพต้องฝังหลังวัคซีนพิษสุนัขบ้าเข็มแรก"};}

      const bd=parseD(pet.bloodDate);
      if(cond==="china"){
        const r2=parseD(rb[1]&&rb[1].date);
        if(!bd)res.blood={ok:null,msg:"ยังไม่ระบุวันที่เจาะเลือด"};
        else if(!r2)res.blood={ok:null,msg:"จีนต้องมีวัคซีนพิษสุนัขบ้าครบ 2 เข็มก่อน"};
        else{const ok=daysBetween(bd,r2)>0;res.blood={ok,msg:ok?"เจาะเลือดหลังวัคซีนเข็มที่ 2 ✓":"จีน: ต้องเจาะเลือดหลังวัคซีนพิษสุนัขบ้าเข็มที่ 2"};}
        if(rb.length<2)res.extra.push({ok:false,msg:"จีน: ต้องฉีดวัคซีนพิษสุนัขบ้า 2 เข็ม (ห่างกัน ≥ 30 วัน)"});
      }else{
        res.blood=bd?{ok:true,msg:"บันทึกวันที่เจาะเลือดแล้ว"}:{ok:null,msg:"ยังไม่ระบุวันที่เจาะเลือด"};
        if(rb.length<1||!rb[0].date)res.extra.push({ok:false,msg:"EU: ต้องฉีดวัคซีนพิษสุนัขบ้า 1 เข็ม"});
      }
    }
  }
  return res;
}
function vaxOverall(res){
  let any=false,fail=false;
  Object.values(res.rows).forEach(arr=>arr.forEach(r=>{if(r.ok===false)fail=true;if(r.ok===true)any=true;}));
  [res.micro,res.blood].forEach(r=>{if(r){if(r.ok===false)fail=true;if(r.ok===true)any=true;}});
  res.extra.forEach(r=>{if(r.ok===false)fail=true;});
  if(fail)return false;if(any)return true;return null;
}
function jobVaxOverall(job){
  if(!job.vaccineDir)return null;
  if(job.vaccineDir==="export"&&job.exportCond==="general")return "general";
  const pets=job.pets||[];
  let any=false,fail=false;
  pets.forEach(p=>{const o=vaxOverall(validatePet(p,job.vaccineDir,job.exportCond,job.travelDate));
    if(o===false)fail=true;if(o===true)any=true;});
  if(fail)return false;if(any)return true;return null;
}

/* ============================ PROGRESS ============================ */
function jobItems(job){const t=JOB_TYPES[job.jobType]||{};return{docs:t.docs||[],steps:t.steps||[]};}
function progressOf(job){
  const it=jobItems(job);let done=0,total=0;
  ["docs","steps"].forEach(k=>{it[k].forEach((_,i)=>{const c=job.checklist&&job.checklist[k]&&job.checklist[k][i];if(c&&c.na)return;total++;if(c&&c.done)done++;});});
  if(isClosed(job))return{done:total,total:total,pct:100};
  return{done,total,pct:total?Math.round(done/total*100):0};
}
function nextStep(job){
  const steps=jobItems(job).steps;
  for(let i=0;i<steps.length;i++){
    const c=job.checklist&&job.checklist.steps&&job.checklist.steps[i];
    if(c&&c.na)continue;
    if(!(c&&c.done))return{idx:i,label:steps[i]};
  }
  return null;
}
function isClosed(job){
  const steps=jobItems(job).steps;
  if(!steps.length)return false;
  const c=job.checklist&&job.checklist.steps&&job.checklist.steps[steps.length-1];
  return !!(c&&c.done);
}

function statCard(cls,lbl,val){return '<div class="stat '+cls+'"><div class="lbl">'+lbl+'</div><div class="val">'+val+'</div></div>';}
function progressBar(p){return '<div class="pwrap"><div class="pbar"><i style="width:'+p.pct+'%"></i></div><span>'+p.done+'/'+p.total+'</span></div>';}
function vaxBadge(j){
  if(!j.vaccineDir)return '<span class="chip-na">—</span>';
  const o=jobVaxOverall(j);
  if(o==="general")return '<span class="chip-na">— ทั่วไป</span>';
  if(o===true)return '<span class="chip-ok">✓ ผ่าน</span>';
  if(o===false)return '<span class="chip-no">✗ ไม่ผ่าน</span>';
  return '<span class="chip-na">— รอข้อมูล</span>';
}

function renderUrgentWidget(){
  const open=DB.jobs.filter(j=>!isClosed(j));
  if(!open.length)return '';
  open.sort((a,b)=>{const at=a.travelDate||"9999",bt=b.travelDate||"9999";return at.localeCompare(bt);});
  const top=open.slice(0,8);
  const today=parseD(todayStr());
  let h='<div class="urgent-card"><div class="urgent-head">⚡ งานเร่งด่วน — มี '+open.length+' งานที่ยังไม่ปิด (แสดง '+top.length+' งานใกล้สุด)</div><div class="urgent-list">';
  top.forEach(j=>{
    const d=parseD(j.travelDate);let cls='ok',label='ยังไม่ระบุวันเดินทาง';
    if(d&&today){
      const days=daysBetween(d,today);
      if(days<0){cls='overdue';label='เลย '+Math.abs(days)+' วัน';}
      else if(days===0){cls='today';label='วันนี้!';}
      else if(days<=7){cls='warn';label='เหลือ '+days+' วัน';}
      else if(days<=14){cls='soft';label='เหลือ '+days+' วัน';}
      else{cls='ok';label='เหลือ '+days+' วัน';}
    }
    const t=JOB_TYPES[j.jobType]||{icon:"",label:j.jobType||""};
    h+='<div class="urgent-row" data-act="edit" data-id="'+j.id+'">'+
       '<span class="urgent-countdown '+cls+'">'+esc(label)+'</span>'+
       '<span class="urgent-meta"><b>'+esc(j.jobNo||"-")+'</b> • '+t.icon+' '+esc(t.label)+' • '+esc(j.customerName||"-")+' • 🐾 '+esc(petsShort(j))+'</span>'+
       (j.assignee?'<span class="urgent-assignee">👤 '+esc(j.assignee)+'</span>':'')+
       '<span class="urgent-travel">'+(d?fmtCE(j.travelDate):"")+'</span>'+
       '</div>';
  });
  h+='</div></div>';
  return h;
}

/* ============================ LEADS (ว่าที่ลูกค้า — pipeline ก่อนเป็นงาน) ============================ */
function openLeads(){return (DB.leads||[]).filter(l=>LEAD_OPEN_STAGES.indexOf(l.stage)>=0);}
function persistLead(l){
  l.updatedAt=new Date().toISOString();
  DB.leads=DB.leads||[];
  const i=DB.leads.findIndex(x=>x.id===l.id);
  if(i<0)DB.leads.push(l);else DB.leads[i]=l;
  saveLocal();
  if(DB.cloud.enabled)cloudUpsert(l);
}
function leadDaysTo(dateStr){
  if(!dateStr)return null;
  const d=parseD(dateStr),t=parseD(todayStr());
  if(!d||!t)return null;
  return Math.round((d-t)/86400000);
}
function leadFuChip(l){
  if(l.stage==="won")return '<span class="urgent-countdown ok">ปิดดีล ✓</span>';
  if(l.stage==="lost")return '<span class="urgent-countdown" style="background:#f1f5f9;color:#64748b">ไม่ปิดดีล</span>';
  const days=leadDaysTo(l.nextFollowUp);
  if(days==null)return '<span class="urgent-countdown soft">ยังไม่นัด F/U</span>';
  if(days<0)return '<span class="urgent-countdown overdue">เลยนัด '+Math.abs(days)+' วัน</span>';
  if(days===0)return '<span class="urgent-countdown today">F/U วันนี้!</span>';
  return '<span class="urgent-countdown '+(days<=3?"warn":"ok")+'">อีก '+days+' วัน</span>';
}
function overdueLeads(){return openLeads().filter(l=>{const d=leadDaysTo(l.nextFollowUp);return d!=null&&d<=0;});}
function leadStageBadge(l){
  const s=LEAD_STAGES[l.stage]||LEAD_STAGES.new;
  return '<span style="font-size:11px;font-weight:700;color:#fff;background:'+s.color+';border-radius:999px;padding:2px 9px;white-space:nowrap">'+s.icon+" "+esc(s.label)+'</span>';
}

/* ============================ RENDER: CALENDAR ============================ */
/* รวม event ทุกงาน (ไม่ยึด month filter ของ dashboard — ปฏิทินดูตามวันจริง)
   travel = วันเดินทาง • blood = วันเจาะเลือด • vax = วัคซีนหมดอายุ (เฉพาะงานที่ยังไม่ปิด) */
function calEvents(){
  const ev={};
  const add=(date,o)=>{if(!date||!/^\d{4}-\d{2}-\d{2}$/.test(date))return;(ev[date]=ev[date]||[]).push(o);};
  DB.jobs.forEach(j=>{
    const closed=isClosed(j);
    if(j.travelDate)add(j.travelDate,{type:"travel",icon:"✈️",cls:closed?"ev-done":"ev-travel",
      label:(j.jobNo||"-")+" "+(j.customerName||"-"),job:j});
    (j.pets||[]).forEach(p=>{
      if(p.bloodDate)add(p.bloodDate,{type:"blood",icon:"🩸",cls:"ev-blood",

/* ============================ FILTERS ============================ */
function jobSearchHay(j){
  const ps=j.pets||[];
  const parts=[j.jobNo,j.customerName,j.customerPhone,j.recordDate,toBE(j.recordDate),fmtCE(j.recordDate),j.travelDate,toBE(j.travelDate),fmtCE(j.travelDate)];
  ps.forEach(p=>{parts.push(p.name,p.microchip);});
  return parts.filter(x=>x).join(" ").toLowerCase();
}
function applyFilters(jobs,f){
  return jobs.filter(j=>{
    if(f.f_q){const q=f.f_q.trim().toLowerCase();if(q){const hay=jobSearchHay(j);if(!q.split(/\s+/).every(t=>hay.includes(t)))return false;}}
    if(f.f_type&&j.jobType!==f.f_type)return false;
    if(f.f_name&&!(j.customerName||"").toLowerCase().includes(f.f_name.toLowerCase()))return false;
    const _df=f.f_datefield==="record"?(j.recordDate||""):(j.travelDate||"");
    if(f.f_from&&_df<f.f_from)return false;
    if(f.f_to&&_df>f.f_to)return false;
    if(f.f_paid==="paid"&&!j.paid)return false;
    if(f.f_paid==="unpaid"&&j.paid)return false;
    if(f.f_stat==="closed"&&!isClosed(j))return false;
    if(f.f_stat==="open"&&isClosed(j))return false;
    if(f.f_assignee&&!(j.assignee||"").toLowerCase().includes(f.f_assignee.toLowerCase()))return false;
    return true;
  });
}
function fldInput(lbl,key,type,val,ph){
  return '<div class="fld"><label>'+lbl+'</label><input type="'+type+'" data-act="filter" data-key="'+key+'" value="'+esc(val||"")+'" placeholder="'+(ph||"")+'"></div>';
}

function statusCell(job,kind,idx,extra){

    '<br><span class="mini" style="font-size:10px">ไม่ใช้</span></td>';

function jcFinHTML(j){

    '<span><span class="k">ขาย</span><b>'+money(sell)+'</b></span>'+
    '<span class="jc-fin-sep">−</span>'+
    '<span><span class="k">ทุน</span><b>'+money(cost)+'</b></span>'+
    '<span class="jc-fin-sep">=</span>'+
    '<span class="'+pCls+'"><span class="k">กำไร</span><b>'+money(profit)+'</b></span>'+
    '</span>';
}

function jobCardHTML(j){
  const t=JOB_TYPES[j.jobType]||{icon:"📋",label:j.jobType||"?"};
  const p=progressOf(j);
  const closed=isClosed(j);
  const exp=STATE.expanded&&STATE.expanded[j.id];
  const d=parseD(j.travelDate),today=parseD(todayStr());
  let cls="ok",label="ยังไม่ระบุวันเดินทาง";
  if(d&&today){
    const days=daysBetween(d,today);
    if(days<0){cls="overdue";label="เลย "+Math.abs(days)+" วัน";}
    else if(days===0){cls="today";label="วันนี้!";}
    else if(days<=7){cls="warn";label="เหลือ "+days+" วัน";}
    else if(days<=14){cls="soft";label="เหลือ "+days+" วัน";}
    else{label="เหลือ "+days+" วัน";}
  }
  const ns=closed?null:nextStep(j);
  let h='<div class="jcard'+(closed?" closed":"")+'" data-jid="'+j.id+'">';
  h+='<div class="jcard-head" data-act="expand" data-id="'+j.id+'">';
  h+='<span class="jc-caret">'+(exp?"▼":"▶")+'</span>';
  h+='<div class="jc-id"><b>'+esc(j.jobNo||"-")+'</b>'+
     '<div class="mini"><b>'+esc(j.customerName||"-")+'</b> • 🐾 '+esc(petsShort(j))+' • '+esc(j.originCountry||"?")+'→'+esc(j.destCountry||"?")+'</div>'+
     (j.assignee?'<div class="mini" style="color:var(--brand-d);font-weight:600">👤 '+esc(j.assignee)+'</div>':"")+'</div>';
  h+='<span class="urgent-countdown '+(closed?"ok":cls)+'">'+(closed?"ปิดจ๊อบแล้ว ✓":esc(label))+'</span>';
  if(d)h+='<span class="mini">'+fmtCE(j.travelDate)+'</span>';
  if(ns)h+='<span class="jc-next">ถัดไป: '+esc(ns.label)+'</span>';
  h+='<div class="jc-actions">'+
     '<button class="btn sm" data-act="paid" data-id="'+j.id+'">'+
       (j.paid?'<span class="badge bg-paid">จ่ายแล้ว ✓</span>':'<span class="badge bg-unpaid">💰 เก็บค่าใช้จ่าย</span>')+'</button>'+
     '<button class="btn sm" data-act="closejob" data-id="'+j.id+'">'+(closed?"🔓 เปิดงาน":"🔒 ปิดจ๊อบ")+'</button>'+
     '<button class="btn sm ghost" data-act="edit" data-id="'+j.id+'" title="แก้ไข">✏️</button>'+
     '</div>';
  h+='</div>';
  h+='<div class="jcard-foot">'+progressBar(p)+jcFinHTML(j)+'</div>';
  if(exp){
    h+='<div class="jcard-body">';
    if(j.notes)h+='<div class="jc-note"><span class="k">📝 Remark:</span>'+esc(j.notes)+'</div>';
    const items=jobItems(j);
    [["docs","📄 เอกสารที่ได้รับ"],["steps","✅ ขั้นตอนการทำงาน"]].forEach(pair=>{
      const k=pair[0];
      if(!items[k].length)return;
      h+='<div><div class="jc-sec">'+pair[1]+'</div>';
      items[k].forEach((lbl,i)=>{
        const c=(j.checklist&&j.checklist[k]&&j.checklist[k][i])||{done:false,date:""};
        if(c.na){
          h+='<div class="ck-row na"><span class="ck-dash">—</span><span class="ck-lbl">'+esc(lbl)+'</span>'+
             '<button class="btn sm ghost na-btn" data-act="na" data-id="'+j.id+'" data-kind="'+k+'" data-idx="'+i+'">ใช้เอกสารนี้</button></div>';
          return;
        }
        const isNext=ns&&k==="steps"&&i===ns.idx;
        h+='<div class="ck-row'+(isNext?" next":"")+'">'+
           '<button class="dot'+(c.done?" done":"")+'" data-act="toggle" data-id="'+j.id+'" data-kind="'+k+'" data-idx="'+i+'">'+(c.done?"✓":"")+'</button>'+
           '<span class="ck-lbl">'+(k==="steps"?(i+1)+". ":"")+esc(lbl)+'</span>'+
           '<input type="date" class="cd ck-date'+(c.date?" has":"")+'" value="'+esc(c.date||"")+'" data-act="setdate" data-id="'+j.id+'" data-kind="'+k+'" data-idx="'+i+'" title="วันที่ทำรายการนี้">'+
           (k==="docs"?'<button class="btn sm ghost na-btn" data-act="na" data-id="'+j.id+'" data-kind="'+k+'" data-idx="'+i+'" title="เอกสารนี้ไม่ใช้กับงานนี้ — ไม่นับใน progress">ไม่ใช้</button>':"")+
           '</div>';

      h+='</div>';

    h+=jcFinBoxHTML(j);

function clonePetToForm(p){
  p=p||{};
  const sp=p.species||"";const l0=sp==="สุนัข"?DOG_BREEDS:sp==="แมว"?CAT_BREEDS:[];
  let bsel="",bextra="";
  if(p.breedMix){bsel=MIXED_BREED;bextra=p.breedMix;}
  else if(p.breed){if(!sp||l0.indexOf(p.breed)>=0){bsel=p.breed;}else{bsel=OTHER_BREED;bextra=p.breed;}}
  const v=p.vax||{};
  function arr(a){a=(a||[]).map(x=>({date:x.date||"",expiry:x.expiry||""}));return a.length?a:[{date:"",expiry:""}];}
  return{name:p.name||"",microchip:p.microchip||"",color:p.color||"",sex:p.sex||"",dob:p.dob||"",species:sp,
    breedSel:bsel,breedExtra:bextra,
    vax:{combined:arr(v.combined),lepto:arr(v.lepto),rabies:arr(v.rabies)},
    micro:p.microchipDate||"",blood:p.bloodDate||""};
}
function syncPetsFromDOM(){
  formPets.forEach((p,i)=>{
    const g=id=>document.getElementById("f-p"+i+"-"+id);
    if(g("name"))p.name=g("name").value;
    if(g("microchip"))p.microchip=g("microchip").value;
    if(g("color"))p.color=g("color").value;
    if(g("sex"))p.sex=g("sex").value;
    if(g("dob"))p.dob=g("dob").value;
    if(g("species"))p.species=g("species").value;
    if(g("breedin")){
      const v=(g("breedin").value||"").trim();
      const sp2=p.species||"";
      const l2=sp2==="สุนัข"?DOG_BREEDS:sp2==="แมว"?CAT_BREEDS:[];
      if(!v){p.breedSel="";}
      else if(l2.indexOf(v)>=0){p.breedSel=v;p.breedExtra="";}
      else if(v===MIXED_BREED){p.breedSel=MIXED_BREED;}
      else{p.breedSel=OTHER_BREED;p.breedExtra=v;}
    }
    if(g("breedfree"))p.breedSel=g("breedfree").value;
    if(g("breedextra"))p.breedExtra=g("breedextra").value;
    if(g("micro"))p.micro=g("micro").value;
    if(g("blood"))p.blood=g("blood").value;
  });
}
/* ------- Microchip duplicate check: ชิพ 1 เบอร์ = สัตว์ 1 ตัว ------- */
function normChip(s){return (s||"").replace(/\s+/g,"").trim();}  // ตัดช่องว่าง: "900 263..." = "900263..."
function findChipJobs(chip,exceptJobId){
  const c=normChip(chip);
  if(!c)return[];
  const res=[];
  DB.jobs.forEach(j=>{
    if(j.id===exceptJobId)return;
    (j.pets||[]).forEach(p=>{
      if(normChip(p.microchip)===c){
        const t=JOB_TYPES[j.jobType]||{label:j.jobType||"-",icon:""};
        res.push({jobNo:j.jobNo||"-",customer:j.customerName||"-",type:(t.icon?t.icon+" ":"")+t.label,jobTypeKey:j.jobType,pet:p.name||"-",closed:isClosed(j)});
      }
    });
  });
  return res;
}
function paintChipWarn(idx){
  const el=document.getElementById("chipdup-"+idx);if(!el)return;
  const inp=document.getElementById("f-p"+idx+"-microchip");
  const chip=inp?inp.value.trim():"";
  const curType=$("#f-jtype")?$("#f-jtype").value:"";
  // ซ้ำกับงานอื่น — แยก "ประเภทเดียวกัน (เสี่ยงคีย์ซ้ำ)" ออกจาก "ต่างประเภท (สัตว์เดิม คนละบริการ = ปกติ)"
  const hits=findChipJobs(chip,STATE.editId);
  const same=hits.filter(x=>x.jobTypeKey===curType);
  const diff=hits.filter(x=>x.jobTypeKey!==curType);
  // ซ้ำกันเองในฟอร์มเดียวกัน (คีย์ชิพเดียวกัน 2 ตัว)
  const selfDup=normChip(chip)&&formPets.some((p,i)=>i!==idx&&normChip(p.microchip)===normChip(chip));
  if(!hits.length&&!selfDup){el.style.display="none";el.innerHTML="";el.className="chip-dup";return;}
  let h="";
  if(same.length){
    h+="⚠️ <b>ชิพนี้มีงานประเภทเดียวกันอยู่แล้ว — เสี่ยงคีย์ซ้ำ:</b><br>"+
      same.map(x=>"• <b>"+esc(x.jobNo)+"</b> "+x.type+" — "+esc(x.customer)+" (🐾 "+esc(x.pet)+(x.closed?" • ปิดจ๊อบแล้ว":" • กำลังทำ")+")").join("<br>")+
      "<br>ตรวจสอบก่อนบันทึก ว่าไม่ได้คีย์งานเดิมซ้ำ";
  }
  if(selfDup)h+=(h?"<br>":"")+"⚠️ ชิพนี้ซ้ำกับสัตว์เลี้ยงตัวอื่นในงานเดียวกัน";
  if(diff.length){
    h+=(h?"<br>":"")+"ℹ️ <b>สัตว์ตัวนี้มีงานบริการอื่นอยู่</b> (ปกติ — สัตว์ตัวเดียวทำได้หลายบริการ):<br>"+
      diff.map(x=>"• <b>"+esc(x.jobNo)+"</b> "+x.type+" — "+esc(x.customer)+(x.closed?" • ปิดแล้ว":" • กำลังทำ")).join("<br>");
  }
  el.style.display="block";
  el.className=(same.length||selfDup)?"chip-dup":"chip-info";
  el.innerHTML=h;
}

  const panel=$("#breed-panel-"+idx);if(!panel)return;
  const p=formPets[idx];if(!p)return;
  const sp=p.species||"";
  const list=sp==="สุนัข"?DOG_BREEDS:sp==="แมว"?CAT_BREEDS:[];
  const f=(filter||"").toLowerCase().trim();
  let matched;
  if(!f){matched=list.slice();}
  else{
    const exact=list.filter(c=>c.toLowerCase()===f);
    const starts=list.filter(c=>c.toLowerCase()!==f&&c.toLowerCase().indexOf(f)===0);
    const contains=list.filter(c=>{const lc=c.toLowerCase();return lc!==f&&lc.indexOf(f)>0;});
    matched=exact.concat(starts,contains);
  }
  let h=matched.map(c=>'<div class="combo-item" data-act="breedpick" data-pet="'+idx+'" data-val="'+esc(c)+'">'+esc(c)+'</div>').join("");
  /* Mixed option — show if no filter, or filter matches "mixed/ผสม" */
  if(!f||MIXED_BREED.toLowerCase().indexOf(f)>=0||"พันธุ์ผสม".indexOf(f)>=0||"mixed".indexOf(f)>=0){

    h+='<div class="combo-item new-entry" data-act="breedpick" data-pet="'+idx+'" data-val="'+esc(filter)+'" data-custom="1">+ ใช้ "'+esc(filter)+'" เป็นสายพันธุ์ (กำหนดเอง)</div>';

  else{
    /* exact match first, then "starts with", then "contains" */
    const exact=COUNTRIES.filter(c=>c.toLowerCase()===f);
    const starts=COUNTRIES.filter(c=>c.toLowerCase()!==f&&c.toLowerCase().indexOf(f)===0);
    const contains=COUNTRIES.filter(c=>{const lc=c.toLowerCase();return lc!==f&&lc.indexOf(f)>0;});
    matched=exact.concat(starts,contains);
  }
  let h='';
  if(matched.length===0){
    h='<div class="combo-empty">ไม่พบประเทศที่ตรงกัน</div>';

    h=matched.map(c=>'<div class="combo-item" data-act="countrypick" data-which="'+which+'" data-val="'+esc(c)+'">'+esc(c)+'</div>').join("");

      h+='<div class="combo-item new-entry" data-act="countrypick" data-which="'+which+'" data-val="'+esc(filter)+'">+ ใช้ "'+esc(filter)+'" เป็นชื่อประเทศ (กำหนดเอง)</div>';

function refreshPetVax(idx){
  const p=formPets[idx];if(!p)return;
  setBE("be-p"+idx+"-dob",p.dob);
  if(document.getElementById("be-p"+idx+"-micro"))setBE("be-p"+idx+"-micro",p.micro);
  if(document.getElementById("be-p"+idx+"-blood"))setBE("be-p"+idx+"-blood",p.blood);
  ["combined","lepto","rabies"].forEach(grp=>{
    (p.vax[grp]||[]).forEach((v,i)=>{setBE("be-"+idx+"-"+grp+"-"+i+"-date",v.date);setBE("be-"+idx+"-"+grp+"-"+i+"-expiry",v.expiry);});
  });
  const dir=getDir();const cond=dir==="export"?getCond():"";
  const travel=$("#f-travel")?$("#f-travel").value:"";
  const res=validatePet(p,dir,cond,travel);
  ["combined","lepto","rabies"].forEach(grp=>{
    res.rows[grp].forEach((r,i)=>{const el=$("#st-"+idx+"-"+grp+"-"+i);if(el)el.innerHTML=stIcon(r);});
  });
  let items=[];
  ["combined","lepto","rabies"].forEach(grp=>{
    res.rows[grp].forEach((r,i)=>{if(r.ok!=null||r.msg)items.push({label:VAX_GROUPS[grp].split(" (")[0]+" เข็มที่ "+(i+1),r:r});});
  });
  if(dir==="export"){
    if(res.micro)items.push({label:"วันที่ฝังไมโครชิพ",r:res.micro});
    if(res.blood)items.push({label:"วันที่เจาะเลือด",r:res.blood});
    res.extra.forEach(r=>items.push({label:"เงื่อนไขประเทศ",r:r}));
  }
  const overall=vaxOverall(res);
  let cls=overall===true?"ok":overall===false?"no":"na";
  let head=overall===true?"✅ วัคซีนผ่านเงื่อนไขทั้งหมด":overall===false?"❌ วัคซีนยังไม่ผ่านเงื่อนไข — ตรวจสอบรายการด้านล่าง":"⏳ รอข้อมูลครบเพื่อตรวจสอบ";
  if(dir==="export"&&cond==="general"){cls="na";head="ℹ️ ปลายทางทั่วไป — บันทึกข้อมูลวัคซีนไว้ ไม่ตรวจเงื่อนไขอัตโนมัติ";}
  if(!dir){cls="na";head="⏳ เลือกทิศทางงาน (Import/Export) ด้านบนก่อนเพื่อตรวจสอบ";}
  let h='<div class="vax-result '+cls+'"><b>'+head+'</b>';
  if(items.length){h+='<ul>';items.forEach(it=>{h+='<li>'+stIcon(it.r)+'<span><b>'+esc(it.label)+':</b> '+esc(it.r.msg||"-")+'</span></li>';});h+='</ul>';}
  h+='</div>';
  const box=$("#vaxResult-"+idx);if(box)box.innerHTML=h;
}

  job.customerBranch=$("#f-cbranch")?$("#f-cbranch").value.trim():"";
  if($("#f-currency"))job.invoiceCurrency=$("#f-currency").value||"THB";
  if($("#f-qty"))job.invoiceQty=Math.max(1,parseInt($("#f-qty").value,10)||1);
  if($("#f-invtitle"))job.invoiceTitle=$("#f-invtitle").value.trim();
  if($("#f-invdesc"))job.invoiceDescription=$("#f-invdesc").value;
  if($("#f-invref"))job.invoiceReference=$("#f-invref").value.trim();
  if($("#f-paymeth"))job.invoicePaymentMethod=$("#f-paymeth").value;
  syncCountryFromDOM("origin");syncCountryFromDOM("dest");
  job.originCountry=resolveCountry("origin");
  job.destCountry=resolveCountry("dest");
  job.jobType=jtype;
  job.vaccineDir=dir;
  job.travelDate=$("#f-travel").value;
  job.recordDate=recDate;
  job.assignee=$("#f-assignee")?$("#f-assignee").value.trim():"";
  const payR=document.querySelector('input[name=paystat]:checked');
  job.paid=payR?payR.value==="pay":false;
  job.sellPrice=parseFloat($("#f-sell")?$("#f-sell").value:"")||0;
  job.costs=formCosts.filter(c=>c.cat||(c.amount!==""&&c.amount!=null)||(c.note&&c.note.trim())).map(c=>({cat:c.cat,amount:parseFloat(c.amount)||0,note:(c.note||"").trim(),adv:!!c.adv}));
  job.paidDate=(job.paid&&$("#f-paiddate"))?$("#f-paiddate").value:"";
  job.exportCond=dir==="export"?getCond():"";
  job.notes=$("#f-notes").value.trim();
  job.attachments=formAttachments.slice();
  syncPetsFromDOM();
  job.pets=formPets.map(p=>{
    let breed="",breedMix="";
    if(p.breedSel===MIXED_BREED){breed=MIXED_BREED;breedMix=(p.breedExtra||"").trim();}
    else if(p.breedSel===OTHER_BREED){breed=(p.breedExtra||"").trim();}
    else{breed=(p.breedSel||"").trim();}
    return{name:(p.name||"").trim(),microchip:(p.microchip||"").trim(),color:(p.color||"").trim(),
      sex:p.sex||"",dob:p.dob||"",species:p.species||"",breed:breed,breedMix:breedMix,
      vax:{combined:p.vax.combined.map(v=>({date:v.date,expiry:v.expiry})),
           lepto:p.vax.lepto.map(v=>({date:v.date,expiry:v.expiry})),
           rabies:p.vax.rabies.map(v=>({date:v.date,expiry:v.expiry}))},
      microchipDate:dir==="export"?(p.micro||""):"",
      bloodDate:dir==="export"?(p.blood||""):""};
  });
  delete job.pet;delete job.vax;delete job.microchipDate;delete job.bloodDate;
  // checklist init / preserve
  if(!job.checklist||prevType!==jtype){
    job.checklist={docs:{},steps:{}};
    const t=JOB_TYPES[jtype]||{};
    (t.docs||[]).forEach((_,i)=>job.checklist.docs[i]={done:false,date:""});
    (t.steps||[]).forEach((_,i)=>job.checklist.steps[i]={done:false,date:""});
  }
  return job;
}

function paintCostCats(){
  const box=$("#costCatBox");if(!box)return;
  const cats=getCostCats();
  /* count usage per category from existing jobs */
  const usage={};
  DB.jobs.forEach(j=>(j.costs||[]).forEach(c=>{if(c.cat){usage[c.cat]=(usage[c.cat]||0)+1;}}));
  let h='';
  if(!cats.length){h='<div class="mini">ยังไม่มีหมวด — กด "Reset เป็น default" เพื่อเริ่มต้น</div>';}
  cats.forEach((c,i)=>{
    const used=usage[c]||0;
    h+='<div class="costcat-row" data-i="'+i+'">'+
       '<input type="text" value="'+esc(c)+'" data-act="catin" data-i="'+i+'">'+
       '<span class="mini" style="white-space:nowrap;min-width:75px;text-align:right">'+(used?('ใช้ใน '+used+' รายการ'):'<span style="color:var(--mut)">ยังไม่ถูกใช้</span>')+'</span>'+
       '<button class="btn sm" data-act="catup" data-i="'+i+'" '+(i===0?'disabled':'')+' title="เลื่อนขึ้น">▲</button>'+
       '<button class="btn sm" data-act="catdown" data-i="'+i+'" '+(i===cats.length-1?'disabled':'')+' title="เลื่อนลง">▼</button>'+
       '<button class="cost-rm" data-act="catrm" data-i="'+i+'" title="ลบหมวด">✕</button>'+
       '</div>';
  });
  box.innerHTML=h;
}

document.addEventListener("click",e=>{
  const el=e.target.closest("[data-act]");if(!el)return;
  const act=el.dataset.act;
  // การแก้ฟอร์มเชิงโครงสร้าง (เพิ่ม/ลบสัตว์ วัคซีน ต้นทุน ไฟล์แนบ เติมข้อมูลลูกค้าเก่า) ก็ถือว่ามีข้อมูลค้าง
  if(STATE.view==="new"&&/^(addpet|rmpet|addvax|rmvax|addcost|rmcost|attachrm|custfill)$/.test(act))FORM_DIRTY=true;
  if(act==="nav"){if(!confirmLeaveForm())return;STATE.view=el.dataset.view;STATE.dupFrom=null;STATE.leadFrom=null;STATE.leadEditId=null;STATE.leadLostId=null;if(el.dataset.view==="new")STATE.editId=null;STATE.filters={};render();window.scrollTo(0,0);}
  else if(act==="clearfilter"){STATE.filters={};render();}
  else if(act==="finpreset"){const r=presetRange(el.dataset.preset);STATE.filters.f_from=r[0];STATE.filters.f_to=r[1];render();}
  else if(act==="calnav"){

  else if(act==="paid"){const j=getJob(el.dataset.id);if(!j)return;

      const def=j.paidDate||todayStr();
      const d=prompt("วันที่รับเงิน (YYYY-MM-DD) — กด OK เพื่อใช้ "+def+" หรือพิมพ์วันที่อื่น",def);

      const v=(d||"").trim();
      j.paid=true;j.paidDate=v||def;
    }else{
      if(!confirm("เปลี่ยน \""+(j.customerName||"-")+"\" กลับเป็น ค้างจ่าย?"))return;
      j.paid=false;j.paidDate="";
    }
    persistJob(j);toast(j.paid?"บันทึก: รับเงินแล้ว ✓":"กลับเป็นค้างจ่าย");render();
  }
  else if(act==="edit"){if(!confirmLeaveForm())return;STATE.editId=el.dataset.id;STATE.dupFrom=null;STATE.view="new";render();window.scrollTo(0,0);}
  else if(act==="dup"){if(!confirmLeaveForm())return;STATE.editId=null;STATE.dupFrom=el.dataset.id;STATE.view="new";STATE.filters={};render();window.scrollTo(0,0);}
  /* ---- Leads ---- */
  else if(act==="lead-add"){
    const f=readLeadQuickForm();
    if(!f.name.trim()){toast("กรอกชื่อลูกค้าก่อน","err");return;}
    if(!f.source){toast("เลือก Lead Source ก่อน — ข้อมูลนี้ย้อนเก็บทีหลังไม่ได้","err");return;}
    const l=Object.assign(blankLead(),f);
    persistLead(l);toast("เพิ่ม Lead \""+l.name+"\" แล้ว ✓","ok");render();
  }
  else if(act==="lead-chip"){STATE.leadStageFilter=el.dataset.stage||"";STATE.leadEditId=null;STATE.leadLostId=null;render();}
  else if(act==="lead-edit"){STATE.leadEditId=el.dataset.id;STATE.leadLostId=null;render();window.scrollTo(0,0);}
  else if(act==="lead-edit-cancel"){STATE.leadEditId=null;render();}
  else if(act==="lead-save"){
    const l=getLead(el.dataset.id);if(!l)return;
    const nm=$("#le-name").value.trim();
    if(!nm){toast("กรอกชื่อลูกค้าก่อน","err");return;}
    l.name=nm;l.phone=$("#le-phone").value.trim();l.lineId=$("#le-line").value.trim();
    l.source=$("#le-source").value;l.petInfo=$("#le-pet").value.trim();l.destCountry=$("#le-dest").value.trim();
    l.targetMonth=$("#le-target").value;l.stage=$("#le-stage").value;l.nextFollowUp=$("#le-fu").value;
    l.assignee=$("#le-assignee").value.trim();
    l.quote={amount:$("#le-qamount").value,sentDate:$("#le-qsent").value,validUntil:$("#le-qvalid").value,status:$("#le-qstatus").value};
    l.notes=$("#le-notes").value;
    l.lostReason=(l.stage==="lost")?($("#le-lostreason").value||l.lostReason||""):"";
    persistLead(l);STATE.leadEditId=null;toast("บันทึก Lead แล้ว ✓","ok");render();
  }
  else if(act==="lead-del"){
    const l=getLead(el.dataset.id);if(!l)return;
    if(!confirm("ลบ Lead \""+(l.name||"-")+"\"?\nลบแล้วจะหายจากทุกเครื่องที่ sync — ยืนยัน?"))return;
    const ts=new Date().toISOString();
    DB.leads=DB.leads.filter(x=>x.id!==l.id);

    saveLocal();if(DB.cloud.enabled)cloudSoftDelete(l.id,l,ts);

  }
  else if(act==="lead-lost"){STATE.leadLostId=el.dataset.id;render();}
  else if(act==="lead-lost-cancel"){STATE.leadLostId=null;render();}
  else if(act==="lead-lost-confirm"){

    if(!r){toast("เลือกเหตุผลก่อน — ข้อมูลนี้ใช้ปรับ marketing/ราคา","err");return;}
    l.stage="lost";l.lostReason=r;STATE.leadLostId=null;
    persistLead(l);toast("บันทึกแล้ว: ไม่ปิดดีล ("+r+")","ok");render();
  }
  else if(act==="lead-reopen"){const l=getLead(el.dataset.id);if(!l)return;l.stage="waiting";l.lostReason="";persistLead(l);toast("เปิด Lead กลับมาตามต่อแล้ว ✓","ok");render();}
  else if(act==="lead-won"){
    if(!confirmLeaveForm())return;
    const l=getLead(el.dataset.id);if(!l)return;
    STATE.leadFrom=l.id;STATE.editId=null;STATE.dupFrom=null;STATE.view="new";STATE.filters={};render();window.scrollTo(0,0);
  }
  else if(act==="open"){const j=getJob(el.dataset.id);if(j){STATE.view="job:"+j.jobType;STATE.filters={};render();window.scrollTo(0,0);}}
  else if(act==="pdf"){generatePDF(el.dataset.id);}
  else if(act==="invoice"){generateInvoice(el.dataset.id);}
  else if(act==="receipt"){generateReceipt(el.dataset.id);}
  else if(act==="closejob"){
    if(!confirmLeaveForm())return;                 // กดจากในฟอร์มที่พิมพ์ค้าง → เตือนก่อน (render จะล้างฟอร์ม)
    const j=getJob(el.dataset.id);if(!j)return;
    const steps=jobItems(j).steps;
    if(!steps.length){toast("งานประเภทนี้ไม่มี checklist steps","err");return;}
    if(!j.checklist)j.checklist={docs:{},steps:{}};
    if(!j.checklist.steps)j.checklist.steps={};
    const lastIdx=steps.length-1;
    const c=j.checklist.steps[lastIdx]||{done:false,date:""};
    if(c.done){
      if(!confirm("เปิดงาน \""+(j.customerName||"-")+"\" กลับมาทำต่อ?"))return;
      c.done=false;j.checklist.steps[lastIdx]=c;
      persistJob(j);toast("เปิดงานกลับมาแล้ว",'ok');
    }else{
      c.done=true;c.date=todayStr();j.checklist.steps[lastIdx]=c;

    }
    render();

  else if(act==="del"){softDeleteJob(el.dataset.id);}
  else if(act==="jobview"){DB.ui=DB.ui||{};DB.ui.jobView=el.dataset.mode;saveLocal();render();}

    render();
  }
  else if(act==="na"){
