    if(!j.checklist)j.checklist={docs:{},steps:{}};
    const k=el.dataset.kind;if(!j.checklist[k])j.checklist[k]={};
    const c=j.checklist[k][+el.dataset.idx]||{done:false,date:""};
    c.na=!c.na;if(c.na)c.done=false;
    j.checklist[k][+el.dataset.idx]=c;
    persistJob(j);render();
    toast(c.na?"ตัดเอกสารออกจากงานนี้แล้ว (ไม่นับใน progress)":"เอาเอกสารกลับมาใช้แล้ว","ok");
  }
  else if(act==="addvax"){syncPetsFromDOM();formPets[+el.dataset.pet].vax[el.dataset.grp].push({date:"",expiry:""});renderPets();}
  else if(act==="rmvax"){syncPetsFromDOM();formPets[+el.dataset.pet].vax[el.dataset.grp].splice(+el.dataset.i,1);renderPets();}
  else if(act==="addpet"){syncPetsFromDOM();formPets.push(blankFormPet());renderPets();}
  else if(act==="rmpet"){syncPetsFromDOM();formPets.splice(+el.dataset.pet,1);renderPets();}
  else if(act==="addcost"){formCosts.push({cat:"",amount:"",note:""});paintCosts();refreshFinance();}
  else if(act==="rmcost"){formCosts.splice(+el.dataset.i,1);paintCosts();refreshFinance();}
  else if(act==="jcaddcost"){const j=getJob(el.dataset.id);if(!j)return;
    if(!Array.isArray(j.costs))j.costs=[];
    j.costs.push({cat:"",amount:"",note:""});persistJob(j);render();}
  else if(act==="jcrmcost"){const j=getJob(el.dataset.id);if(!j||!Array.isArray(j.costs))return;
    j.costs.splice(+el.dataset.i,1);persistJob(j);render();}
  else if(act==="savejob"){saveJobFromForm();}
  else if(act==="suggestjobno"){const rd=$("#f-record")?$("#f-record").value:"";const jt=$("#f-jtype")?$("#f-jtype").value:"";const inp=$("#f-jobno");if(inp){inp.value=nextJobNo(rd,jt);inp.focus();}toast("เติมเลขถัดไปของประเภทนี้ในเดือนนี้แล้ว — ตรวจก่อนบันทึก","ok");}
  else if(act==="export"){doExport();}
  else if(act==="excel"){doExportExcel();}
  else if(act==="csv"){doExportCSV();}
  else if(act==="importbtn"){$("#importFile").click();}
  else if(act==="cloud-save"){cloudSave();}
  else if(act==="cloud-pull"){cloudPull(false).then(()=>render());}
  else if(act==="fixdupnos"){if(confirm("แก้เลขที่งานซ้ำอัตโนมัติ? (งานที่สร้างก่อนคงเลขเดิม งานที่สร้างทีหลังได้เลขใหม่)"))fixDupJobNos();}
  else if(act==="retrysync"){toast("กำลังลองส่งขึ้น Cloud อีกครั้ง...");retryPendingSync().then(()=>{const n=(DB.pendingSync||[]).length;toast(n?("ยังเหลือ "+n+" งานที่ส่งไม่สำเร็จ"):"ส่งขึ้น Cloud ครบแล้ว ✓",n?"err":"ok");});}
  else if(act==="cloud-push"){cloudPush();}
  else if(act==="cloud-off"){DB.cloud.enabled=false;saveLocal();toast("ตัดการเชื่อมต่อ Cloud แล้ว");render();}
  else if(act==="drive-save"){driveSave();}
  else if(act==="drive-off"){DB.drive.enabled=false;saveLocal();toast("ตัดการเชื่อมต่อ Google Drive แล้ว");render();}
  else if(act==="addteam"){if(!Array.isArray(DB.team))DB.team=[];DB.team.push({name:"",email:""});saveLocal();paintTeam();}
  else if(act==="teamrm"){DB.team.splice(+el.dataset.i,1);saveLocal();paintTeam();}
  else if(act==="addcat"){
    const inp=$("#newCostCat");if(!inp)return;
    const v=(inp.value||"").trim();
    if(!v){toast("กรุณาพิมพ์ชื่อหมวด","err");return;}
    if(!Array.isArray(DB.costCats)||!DB.costCats.length)DB.costCats=DEFAULT_COST_CATS.slice();
    if(DB.costCats.indexOf(v)>=0){toast("มีหมวดนี้อยู่แล้ว","err");return;}
    DB.costCats.push(v);saveLocal();inp.value="";paintCostCats();
    /* update header pill count */
    const head=document.querySelector(".form-card h3 .pill.on");if(head)head.textContent=DB.costCats.length+" หมวด";
    toast("เพิ่มหมวด \""+v+"\" แล้ว","ok");
  }
  else if(act==="catrm"){
    if(!Array.isArray(DB.costCats))return;
    const i=+el.dataset.i;const name=DB.costCats[i];if(name==null)return;
    /* check usage */
    let used=0;DB.jobs.forEach(j=>(j.costs||[]).forEach(c=>{if(c.cat===name)used++;}));
    const msg=used?("หมวด \""+name+"\" ถูกใช้ใน "+used+" รายการของงานเก่า — ข้อมูลในงานเก่าจะยังคงอยู่ แต่จะถูกจัดเป็น \"(ไม่ระบุหมวด)\" ในสรุป\n\nยืนยันลบ?"):("ลบหมวด \""+name+"\" ?");
    if(!confirm(msg))return;
    DB.costCats.splice(i,1);saveLocal();paintCostCats();
    const head=document.querySelector(".form-card h3 .pill.on");if(head)head.textContent=DB.costCats.length+" หมวด";
    toast("ลบหมวดแล้ว");
  }
  else if(act==="catup"){
    if(!Array.isArray(DB.costCats))return;
    const i=+el.dataset.i;if(i<=0)return;
    const a=DB.costCats[i-1];DB.costCats[i-1]=DB.costCats[i];DB.costCats[i]=a;
    saveLocal();paintCostCats();
  }
  else if(act==="catdown"){
    if(!Array.isArray(DB.costCats))return;
    const i=+el.dataset.i;if(i>=DB.costCats.length-1)return;
    const a=DB.costCats[i+1];DB.costCats[i+1]=DB.costCats[i];DB.costCats[i]=a;
    saveLocal();paintCostCats();
  }
  else if(act==="resetcats"){
    if(!confirm("Reset รายการหมวดต้นทุนเป็น default 27 หมวด?\n\nหมวดที่เพิ่ม/แก้/ลบจะถูกแทนที่ — ข้อมูลในงานเก่าไม่ได้รับผลกระทบ"))return;
    DB.costCats=DEFAULT_COST_CATS.slice();saveLocal();paintCostCats();
    const head=document.querySelector(".form-card h3 .pill.on");if(head)head.textContent=DB.costCats.length+" หมวด";
    toast("Reset เป็น default แล้ว ✓","ok");
  }
  else if(act==="driveconnect"){ensureDriveToken().then(()=>{paintAttachments();toast("เชื่อมต่อ Google Drive แล้ว — กดอัปโหลดได้เลย","ok");}).catch(e=>toast("เชื่อมต่อ Google ไม่สำเร็จ: "+(e&&e.message||e),"err"));}
  else if(act==="attachup"){const fi=$("#attachFile");if(fi)fi.click();}
  else if(act==="attachrm"){formAttachments.splice(+el.dataset.i,1);paintAttachments();}
  else if(act==="calcreate"||act==="calupdate"){
    const j=getJob(STATE.editId);if(!j){toast("ต้องบันทึกงานก่อน","err");return;}
    if(!j.travelDate){toast("งานนี้ยังไม่มีวันเดินทาง","err");return;}
    const inv=collectInviteEmails();
    (async()=>{
      try{
        if(j.calendarEvent&&j.calendarEvent.id&&act==="calupdate"){try{await deleteCalendarEvent(j.calendarEvent.id);}catch(e){}}
        toast("กำลังสร้าง event ใน Google Calendar..."+(inv.length?(" + เชิญ "+inv.length+" คน"):""));
        const ev=await createCalendarEvent(j,inv);
        j.calendarEvent={id:ev.id,link:ev.htmlLink||"",createdAt:new Date().toISOString(),attendees:inv};
        persistJob(j);paintCalendar();toast("ตั้งเตือนใน Calendar สำเร็จ ✓","ok");
      }catch(e){toast("ไม่สำเร็จ: "+(e&&e.message||e),"err");}
    })();
  }
  else if(act==="caldelete"){
    const j=getJob(STATE.editId);if(!j||!j.calendarEvent||!j.calendarEvent.id)return;
    if(!confirm("ลบ event ใน Google Calendar?"))return;
    (async()=>{
      try{await deleteCalendarEvent(j.calendarEvent.id);}catch(e){}
      j.calendarEvent=null;persistJob(j);paintCalendar();toast("ลบ event แล้ว","ok");
    })();
  }
  else if(act==="remadd"){
    const j=getJob(STATE.editId);if(!j){toast("ต้องบันทึกงานก่อน 1 ครั้ง จึงจะสร้างเตือนได้","err");return;}
    const sel=$("#rem-label");let label=sel?sel.value:"";
    if(label==="อื่นๆ (พิมพ์เอง)")label=$("#rem-custom")?$("#rem-custom").value.trim():"";
    const date=$("#rem-date")?$("#rem-date").value:"";
    const time=$("#rem-time")?$("#rem-time").value:"";
    if(!label){toast("กรอกหัวข้อเตือนก่อน","err");return;}
    if(!date){toast("เลือกวันที่เตือนก่อน","err");return;}
    const inv=collectInviteEmails();
    (async()=>{
      try{
        toast("กำลังสร้างเตือน \""+label+"\" ใน Google Calendar...");
        const ev=await createReminderEvent(j,label,date,inv,time);
        if(!j.reminders)j.reminders=[];
        j.reminders.push({label:label,date:date,time:time||"",eventId:ev.id,link:ev.htmlLink||"",attendees:inv,createdAt:new Date().toISOString()});
        persistJob(j);paintCalendar();
        toast("สร้างเตือน \""+label+"\" สำเร็จ ✓","ok");
      }catch(e){toast("ไม่สำเร็จ: "+(e&&e.message||e),"err");}
    })();
  }
  else if(act==="remdel"){
    const j=getJob(STATE.editId);if(!j||!j.reminders)return;
    const ri=+el.dataset.i;const r=j.reminders[ri];if(!r)return;
    if(!confirm("ลบเตือน \""+r.label+"\" ? (event ใน Calendar จะถูกลบด้วย)"))return;
    (async()=>{
      try{if(r.eventId)await deleteCalendarEvent(r.eventId);}catch(e){}
      j.reminders.splice(ri,1);persistJob(j);paintCalendar();toast("ลบเตือนแล้ว","ok");
    })();
  }
  else if(act==="wipe"){if(confirm("ยืนยันลบข้อมูลทั้งหมดในเครื่องนี้?")){DB.jobs=[];saveLocal();toast("ลบข้อมูลแล้ว");render();}}
  else if(act==="countrytoggle"){
    const which=el.dataset.which;const p=$("#"+which+"-panel");
    if(p&&p.classList.contains("open")){closeAllCountryPanels();}
    else{const inp=$("#f-"+which+"-input");paintCountryPanel(which,inp?inp.value:"");openCountryPanel(which);if(inp)inp.focus();}
  }
  else if(act==="countrypick"){pickCountry(el.dataset.which,el.dataset.val||"");}
  else if(act==="breedtoggle"){
    const idx=+el.dataset.pet;const p=$("#breed-panel-"+idx);
    if(p&&p.classList.contains("open")){closeAllCountryPanels();}
    else{const inp=$("#f-p"+idx+"-breedin");paintBreedPanel(idx,inp?inp.value:"");openBreedPanel(idx);if(inp)inp.focus();}
  }
  else if(act==="breedpick"){pickBreed(+el.dataset.pet,el.dataset.val||"",{mixed:el.dataset.mixed==="1",custom:el.dataset.custom==="1"});}
  else if(act==="togglecat"){
    const det=document.getElementById(el.dataset.det);
    if(!det)return;
    const open=det.style.display==="table-row"||det.style.display==="";
    if(open){det.style.display="none";el.classList.remove("open");}
    else{det.style.display="table-row";el.classList.add("open");}
  }
  else if(act==="custfill"){
    const src=getJob(el.dataset.id);if(!src)return;
    fillFromCustomer(src);
    const banner=$("#custFillBanner");if(banner)banner.style.display="none";
  }
  else if(act==="custfilldismiss"){const b=$("#custFillBanner");if(b)b.style.display="none";STATE._custFillDismissed=true;}
});
/* close combo panels when clicking outside */
document.addEventListener("click",e=>{
  if(!e.target.closest(".combo"))closeAllCountryPanels();
},true);
/* ESC to close combo panels */
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeAllCountryPanels();});
document.addEventListener("input",e=>{
  if(STATE.view==="new"&&!/^rem-/.test(e.target.id||""))FORM_DIRTY=true;
  const el=e.target.closest("[data-act]");if(!el)return;
  const act=el.dataset.act;
  if(act==="filter"){STATE.filters[el.dataset.key]=el.value;
    if(el.type==="text"){const sel=document.activeElement;render();
      const back=document.querySelector('[data-key="'+el.dataset.key+'"]');if(back){back.focus();back.setSelectionRange(back.value.length,back.value.length);}}
    else render();}
  else if(act==="vaxin"){const pp=formPets[+el.dataset.pet];if(pp)pp.vax[el.dataset.grp][+el.dataset.i][el.dataset.f]=el.value;refreshPetVax(+el.dataset.pet);}
  else if(act==="petin"){const pp=formPets[+el.dataset.pet];if(pp)pp[el.dataset.f]=el.value;
    if(el.dataset.f==="microchip")paintChipWarn(+el.dataset.pet);}
  else if(act==="monthsel"){STATE.fMonth=el.value;render();}
  else if(act==="petctx"){const pp=formPets[+el.dataset.pet];if(pp)pp[el.dataset.f]=el.value;refreshPetVax(+el.dataset.pet);}
  else if(act==="finin"){refreshFinance();}
  else if(act==="recin"){setBE("be-record",el.value);}
  else if(act==="costin"){if(formCosts[+el.dataset.i]){formCosts[+el.dataset.i][el.dataset.f]=(el.type==="checkbox")?el.checked:el.value;if(el.type==="checkbox"&&el.closest(".cost-adv"))el.closest(".cost-adv").classList.toggle("on",el.checked);}refreshFinance();}
  else if(act==="jcfin"){const j=getJob(el.dataset.id);if(j){j.sellPrice=el.value;updateJcFin(j);}}
  else if(act==="jccost"){const j=getJob(el.dataset.id);if(j){
    if(!Array.isArray(j.costs))j.costs=[];
    const ci=+el.dataset.i;if(!j.costs[ci])j.costs[ci]={cat:"",amount:"",note:""};
    j.costs[ci][el.dataset.f]=(el.type==="checkbox")?el.checked:el.value;
    if(el.type==="checkbox"&&el.closest(".cost-adv"))el.closest(".cost-adv").classList.toggle("on",el.checked);
    updateJcFin(j);}}

function toggleStep(id,kind,idx){
  const j=getJob(id);if(!j)return;
  if(!j.checklist)j.checklist={docs:{},steps:{}};
  if(!j.checklist[kind])j.checklist[kind]={};
  const c=j.checklist[kind][idx]||{done:false,date:""};

  else{c.done=!c.done;if(c.done&&!c.date)c.date=todayStr();}

}
let SAVING_JOB=false; // กันกดบันทึกซ้ำตอนรอออกเลข
async function saveJobFromForm(){
  if(SAVING_JOB)return;
  if(!$("#f-cname").value.trim()){toast("กรุณากรอกชื่อลูกค้า","err");$("#f-cname").focus();return;}
  const manualNo=$("#f-jobno")?$("#f-jobno").value.trim():"";
  if(manualNo&&jobNoExists(manualNo,STATE.editId)){
    toast("เลขที่งาน "+manualNo+" ซ้ำกับงานอื่น — แก้ก่อนบันทึก","err");
    if($("#f-jobno"))$("#f-jobno").focus();return;
  }
  SAVING_JOB=true;
  try{
    const job=readFormJob();
    // เช็คไมโครชิพซ้ำ — เตือน/ยืนยันเฉพาะ "ประเภทงานเดียวกัน" (เสี่ยงคีย์ซ้ำจริง)
    // ต่างประเภท (เช่น Titer → Export) = สัตว์ตัวเดิมคนละบริการ ถือเป็นปกติ ไม่ต้องถาม
    const chipDups=[];
    (job.pets||[]).forEach(p=>{
      const same=findChipJobs(p.microchip,job.id).filter(x=>x.jobTypeKey===job.jobType);
      if(same.length)chipDups.push({chip:(p.microchip||"").trim(),pet:p.name||"-",hits:same});
    });
    if(chipDups.length){
      const msg="⚠️ พบไมโครชิพที่มีงาน 'ประเภทเดียวกัน' อยู่แล้ว (เสี่ยงคีย์ซ้ำ):\n\n"+
        chipDups.map(d=>"🆔 "+d.chip+" ("+d.pet+") อยู่ในงาน:\n"+
          d.hits.map(x=>"   • "+x.jobNo+" — "+x.customer+(x.closed?" (ปิดจ๊อบแล้ว)":" (กำลังทำ)")).join("\n")).join("\n\n")+
        "\n\nถ้าตั้งใจเปิดงานประเภทเดิมซ้ำ กด OK เพื่อบันทึกต่อ\nถ้าสงสัยว่าคีย์งานซ้ำ กด Cancel เพื่อกลับไปตรวจสอบ";
      if(!confirm(msg))return;
    }
    if(!job.jobNo){
      job.jobNo=await issueJobNo(job.recordDate,job.jobType);
      if(/^CV-TMP-/.test(job.jobNo))toast("ออฟไลน์ — ใช้เลขชั่วคราว "+job.jobNo+" ระบบจะออกเลขจริงให้อัตโนมัติเมื่อเชื่อม Cloud ได้","err");
      // ตาข่ายสุดท้าย: ดึง cloud ล่าสุดมาเช็คอีกรอบก่อนบันทึก เผื่อมีเครื่องอื่นเพิ่งจองเลขนี้
      if(DB.cloud.enabled&&!/^CV-TMP-/.test(job.jobNo)){
        try{await cloudPull(true);
          if(jobNoExists(job.jobNo,job.id)){
            const fresh=await issueJobNo(job.recordDate,job.jobType);
            toast("เลข "+job.jobNo+" เพิ่งถูกใช้โดยเครื่องอื่น — เปลี่ยนเป็น "+fresh+" ให้อัตโนมัติ","ok");
            job.jobNo=fresh;
          }
        }catch(e){}
      }
    }
    // ---- กันบันทึกทับงานที่เครื่องอื่นเพิ่งแก้ (conflict) ----
    if(DB.cloud.enabled&&STATE.editId){
      const before=getJob(STATE.editId);const beforeUpd=before?(before.updatedAt||""):"";
      try{await cloudPull(true);
        const after=getJob(STATE.editId);
        if(after&&(after.updatedAt||"")>beforeUpd){
          if(!confirm("⚠️ งานนี้เพิ่งถูกแก้จากอุปกรณ์อื่น (อัปเดตล่าสุด "+String(after.updatedAt||"").replace("T"," ").slice(0,16)+")\n\nถ้ากดบันทึกต่อ ข้อมูลที่คุณกำลังแก้จะทับของอีกเครื่อง\n\nกด OK = บันทึกทับด้วยข้อมูลของคุณ\nกด Cancel = ยกเลิก (ไปดูเวอร์ชันล่าสุดก่อน)")){
            render();return;
          }
        }
      }catch(e){}
    }
    persistJob(job);
    FORM_DIRTY=false;
    // ---- ปิดดีลจาก Lead: ผูก lead กับงาน + ย้าย stage เป็น won ----
    if(!STATE.editId&&STATE.leadFrom){
      const ld=getLead(STATE.leadFrom);
      if(ld){ld.stage="won";ld.jobId=job.id;
        if(ld.quote&&ld.quote.amount)ld.quote.status="accepted";
        persistLead(ld);}
      STATE.leadFrom=null;
    }
    toast(STATE.editId?"อัปเดตงานแล้ว":"บันทึกงานใหม่แล้ว ("+job.jobNo+")","ok");
    STATE.editId=null;STATE.dupFrom=null;STATE.view="job:"+job.jobType;STATE.filters={};render();window.scrollTo(0,0);
    // auto sync: บันทึกเสร็จ → ดึงข้อมูลล่าสุดจาก cloud มารวมให้เลย (push ทำใน persistJob แล้ว)
    if(DB.cloud.enabled)cloudPull(true).then(ok=>{if(ok&&STATE.view!=="new")render();});
  }finally{SAVING_JOB=false;}
}

function loadSheetJS(){
  if(window.XLSX)return Promise.resolve(window.XLSX);
  return new Promise((resolve,reject)=>{
    const s=document.createElement("script");
    s.src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js";
    s.onload=()=>resolve(window.XLSX);
    s.onerror=()=>reject(new Error("โหลด SheetJS ไม่สำเร็จ — เช็ค internet หรือใช้ CSV แทน"));
    document.head.appendChild(s);
  });
}
function doExportExcel(){
  if(!DB.jobs.length){toast("ยังไม่มีงานให้ export","err");return;}
  toast("กำลังโหลด SheetJS + เตรียมไฟล์...");
  loadSheetJS().then(XLSX=>{
    const rows=buildExportRows();
    const ws=XLSX.utils.json_to_sheet(rows);
    /* set column widths roughly */
    const headers=Object.keys(rows[0]||{});
    ws["!cols"]=headers.map(h=>{
      const maxLen=Math.max(h.length,...rows.map(r=>String(r[h]||"").length));
      return {wch:Math.min(Math.max(maxLen+2,10),60)};
    });
    const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,"Convey Jobs");
    XLSX.writeFile(wb,"convey-jobs-"+todayStr()+".xlsx");
    toast("Export Excel สำเร็จ ✓ ("+rows.length+" งาน)","ok");
  }).catch(e=>{
    toast("โหลด Excel library ไม่สำเร็จ: "+(e&&e.message||e)+" — กดปุ่ม CSV แทนได้","err");
  });
}
function doExportCSV(){
  if(!DB.jobs.length){toast("ยังไม่มีงานให้ export","err");return;}
  const rows=buildExportRows();
  const headers=Object.keys(rows[0]||{});
  const csvEsc=v=>{const s=String(v==null?"":v);return /[,"\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s;};
  const csv=headers.join(",")+"\n"+rows.map(r=>headers.map(h=>csvEsc(r[h])).join(",")).join("\n");
  /* UTF-8 BOM so Excel reads Thai correctly */
  const blob=new Blob(["﻿"+csv],{type:"text/csv;charset=utf-8"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);
  a.download="convey-jobs-"+todayStr()+".csv";a.click();
  toast("Export CSV สำเร็จ ✓ ("+rows.length+" งาน)","ok");
}
function handleImport(file){
  if(!file)return;
  const rd=new FileReader();
  rd.onload=()=>{
    try{const d=JSON.parse(rd.result);
      if(!d.jobs||!Array.isArray(d.jobs))throw new Error("ไฟล์ไม่ถูกต้อง");
      if(!confirm("นำเข้า "+d.jobs.length+" งาน? ข้อมูลเดิมในเครื่องจะถูกแทนที่"))return;
      DB.tombstones=DB.tombstones||{};
      DB.jobs=d.jobs.filter(x=>{if(x&&x._deleted){DB.tombstones[x.id]=x._deletedAt||x.updatedAt||new Date().toISOString();return false;}return true;});
      DB.jobs.forEach(migrateJobPets);
      if(Array.isArray(d.leads))DB.leads=d.leads.filter(x=>{if(x&&x._deleted){DB.tombstones[x.id]=x._deletedAt||x.updatedAt||new Date().toISOString();return false;}return true;});
      if(d.cloud)DB.cloud=Object.assign(DB.cloud,d.cloud);
      if(d.drive&&typeof d.drive==="object")DB.drive=Object.assign(DB.drive,d.drive);
      if(d.ui&&typeof d.ui==="object")DB.ui=d.ui;
      // restore ทุก key ให้ครบ (team/costCats/company/tombstones) — ไม่งั้นย้ายเครื่องแล้วข้อมูลหาย
      if(Array.isArray(d.team))DB.team=d.team;
      if(Array.isArray(d.costCats)&&d.costCats.length)DB.costCats=d.costCats;
      if(d.company&&typeof d.company==="object")DB.company=Object.assign({},DEFAULT_COMPANY,d.company);
      if(d.tombstones&&typeof d.tombstones==="object")DB.tombstones=Object.assign({},DB.tombstones||{},d.tombstones);
      if(Array.isArray(d.pendingSync))DB.pendingSync=d.pendingSync;
      // เลขรัน Invoice/Receipt: merge ด้วยค่าสูงสุดต่อเดือน กันออกเลขซ้ำกับที่เคยออกไปแล้ว
      ["invSeq","rcpSeq"].forEach(k=>{
        if(d[k]&&typeof d[k]==="object"){DB[k]=DB[k]||{};
          Object.keys(d[k]).forEach(m=>{DB[k][m]=Math.max(Number(DB[k][m])||0,Number(d[k][m])||0);});}
      });
      saveLocal();toast("นำเข้าข้อมูลสำเร็จ","ok");render();
    }catch(err){toast("นำเข้าไม่สำเร็จ: "+err.message,"err");}
  };
  rd.readAsText(file);
}

function numberToWordsEn(n){
  /* English number to words — for currencies other than THB */
  const num=Math.floor(Math.abs(Number(n)||0));
  if(num===0)return "Zero";
  const ones=["","One","Two","Three","Four","Five","Six","Seven","Eight","Nine","Ten","Eleven","Twelve","Thirteen","Fourteen","Fifteen","Sixteen","Seventeen","Eighteen","Nineteen"];
  const tens=["","","Twenty","Thirty","Forty","Fifty","Sixty","Seventy","Eighty","Ninety"];
  function under1000(n){
    let r="";
    if(n>=100){r+=ones[Math.floor(n/100)]+" Hundred";n=n%100;if(n)r+=" ";}
    if(n>=20){r+=tens[Math.floor(n/10)];n=n%10;if(n)r+="-"+ones[n];}
    else if(n>0)r+=ones[n];
    return r;
  }
  const scales=["","Thousand","Million","Billion"];
  let result="",i=0,x=num;
  while(x>0){const part=x%1000;if(part)result=under1000(part)+(scales[i]?" "+scales[i]:"")+(result?" "+result:"");x=Math.floor(x/1000);i++;}
  return result.trim();
}

}
function computeVAT(j){
  /* advance = เงินทดรองจ่ายแทนลูกค้า (cost item ที่ติ๊ก adv) — ไม่รวมฐาน VAT */
  const co=DB.company||DEFAULT_COMPANY;
  const rate=Number(co.vatRate)||0;const mode=co.vatMode||"exclusive";
  const sell=Number(j.sellPrice)||0;
  const advance=Math.min(jobAdvanceTotal(j),sell);
  const svc=sell-advance; /* ส่วนค่าบริการ (ฐาน VAT) */
  if(mode==="none"||rate<=0)return {subtotal:sell,vat:0,advance:0,total:sell,rate:0,mode:"none"};
  if(mode==="inclusive"){
    const subtotal=Math.round((svc/(1+rate/100))*100)/100;
    const vat=Math.round((svc-subtotal)*100)/100;
    return {subtotal,vat,advance,total:sell,rate,mode};
  }
  /* exclusive */
  const vat=Math.round(svc*rate/100*100)/100;
  return {subtotal:svc,vat,advance,total:sell+vat,rate,mode};
}
function bahtText(n){
  /* Convert number to Thai baht text */
  const num=Math.abs(Number(n)||0);
  const intPart=Math.floor(num);
  const satang=Math.round((num-intPart)*100);
  const TH_DIG=["ศูนย์","หนึ่ง","สอง","สาม","สี่","ห้า","หก","เจ็ด","แปด","เก้า"];
  const TH_POS=["","สิบ","ร้อย","พัน","หมื่น","แสน","ล้าน"];
  function readGroup(s){
    /* s is up to 7 digits */
    let r="";const len=s.length;
    for(let i=0;i<len;i++){
      const dig=+s[i];const pos=len-1-i;
      if(dig===0)continue;
      if(pos===1&&dig===1)r+="สิบ";
      else if(pos===1&&dig===2)r+="ยี่สิบ";
      else if(pos===0&&dig===1&&len>1)r+="เอ็ด";
      else r+=TH_DIG[dig]+TH_POS[pos];
    }
    return r;
  }
  let result="";
  if(intPart===0)result="ศูนย์";
  else{
    const s=String(intPart);
    if(s.length<=7)result=readGroup(s);
    else{
      const head=s.slice(0,s.length-6);
      const tail=s.slice(-6);
      result=readGroup(head)+"ล้าน"+readGroup(tail);
    }
  }
  result+="บาท";
  if(satang===0)result+="ถ้วน";
  else result+=readGroup(String(satang).padStart(2,"0"))+"สตางค์";
  return result;
}

function generateInvoice(id){
  const j=getJob(id);
  if(!j){toast("ไม่พบข้อมูลงาน","err");return;}
  if(!j.sellPrice||Number(j.sellPrice)<=0){toast("ยังไม่ได้ใส่ราคาขายลูกค้า — กรอกราคาก่อนออก Invoice","err");return;}
  const co=DB.company||DEFAULT_COMPANY;
  if(!co.taxId||!co.address){if(!confirm("ยังไม่ได้กรอกข้อมูลบริษัท (เลขผู้เสียภาษี/ที่อยู่) ในหน้าตั้งค่า — ดำเนินการต่อหรือไม่?"))return;}
  if(!j.invoice||!j.invoice.no){
    j.invoice={no:nextInvNo(),issuedAt:new Date().toISOString()};
    persistJob(j);
  }
  const w=window.open("","_blank");
  if(!w){toast("เบราว์เซอร์บล็อก pop-up — กรุณาอนุญาต pop-up","err");return;}
  w.document.write(buildDocHTML(j,"invoice"));w.document.close();
  toast("เปิด Invoice "+j.invoice.no+" แล้ว ✓","ok");
}
function generateReceipt(id){
  const j=getJob(id);
  if(!j){toast("ไม่พบข้อมูลงาน","err");return;}
  if(!j.paid){toast("ยังไม่ได้ mark Paid — เปลี่ยนสถานะการเงินก่อน","err");return;}
  if(!j.sellPrice||Number(j.sellPrice)<=0){toast("ยังไม่ได้ใส่ราคาขายลูกค้า","err");return;}
  const co=DB.company||DEFAULT_COMPANY;
  if(!co.taxId||!co.address){if(!confirm("ยังไม่ได้กรอกข้อมูลบริษัทในหน้าตั้งค่า — ดำเนินการต่อหรือไม่?"))return;}
  const rcpHasVat=(co.vatMode==="inclusive"||co.vatMode==="exclusive")&&Number(co.vatRate)>0;
  if(rcpHasVat&&!j.customerAddress){if(!confirm("เอกสารนี้เป็นใบเสร็จรับเงิน/ใบกำกับภาษี — ควรมีที่อยู่ลูกค้า (ยังไม่ได้กรอก) ดำเนินการต่อหรือไม่?"))return;}
  if(!j.receipt||!j.receipt.no){
    j.receipt={no:nextRcpNo(),issuedAt:new Date().toISOString()};
    persistJob(j);
  }
  const w=window.open("","_blank");
  if(!w){toast("เบราว์เซอร์บล็อก pop-up — กรุณาอนุญาต pop-up","err");return;}
  w.document.write(buildDocHTML(j,"receipt"));w.document.close();
  toast("เปิด Receipt "+j.receipt.no+" แล้ว ✓","ok");
}

/* เปิดงานจาก link ใน Calendar (#job=...) */
function openHashJob(){
  if(location.hash.indexOf("#job=")!==0)return false;
  if(STATE.view==="new"&&FORM_DIRTY)return true;   // ฟอร์มเปิดอยู่+พิมพ์ค้าง — ห้าม render ทับ (เรียกซ้ำหลัง pull)
  const jid=decodeURIComponent(location.hash.slice(5));
  if(!getJob(jid))return false;
  STATE.view="new";STATE.editId=jid;render();window.scrollTo(0,0);
  return true;
}
openHashJob();
if(DB.cloud.enabled){cloudPull(true).then(async ok=>{if(ok){await backfillJobNos();if(!openHashJob()&&STATE.view!=="new")render();resolveTmpNos();retryPendingSync();}});}
/* ------- Version beacon: เตือนเครื่องที่เปิดหน้าเก่าค้างให้ refresh ------- */
function checkBuildVersion(){
  if(!DB.cloud.enabled)return;
  const base=(DB.cloud.url||"").trim().replace(/\/+$/,"").replace(/\/rest\/v1.*$/i,"");
  // อ่าน build ล่าสุดที่เครื่องอื่นบันทึกไว้ (เก็บใน localStorage ร่วมกับ cloud meta ผ่าน job_counters prefix พิเศษ)
  fetch(base+"/rest/v1/rpc/get_build",{method:"POST",headers:cloudHeaders(),body:"{}"})
    .then(r=>r.ok?r.json():null)
    .then(latest=>{
      if(latest&&latest>BUILD_VERSION){BUILD_STALE=latest;paintGlobalDupAlert();}
    }).catch(()=>{});
  // บันทึก build ของเครื่องนี้ขึ้น cloud (ถ้าใหม่กว่า)
  fetch(base+"/rest/v1/rpc/set_build",{method:"POST",headers:cloudHeaders(),body:JSON.stringify({p_build:BUILD_VERSION})}).catch(()=>{});
}
checkBuildVersion();
/* auto sync: ดึงจาก cloud ทุก 5 นาที (เฉพาะตอนไม่ได้เปิดฟอร์มอยู่ — กันข้อมูลที่กำลังคีย์หาย) */
setInterval(function(){
  if(DB.cloud.enabled&&document.visibilityState==="visible"&&STATE.view!=="new"){
    cloudPull(true).then(ok=>{if(ok&&STATE.view!=="new")render();});
    retryPendingSync();
  }
},5*60*1000);
startDriveAutoRefresh();
